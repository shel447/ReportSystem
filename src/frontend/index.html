<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能报告系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0b8;
            --border: #2a2a4a;
            --success: #00d2ff;
            --warning: #ffc107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar h1 {
            font-size: 16px;
            font-weight: 700;
            padding: 0 20px 20px;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(233, 69, 96, 0.1);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(233, 69, 96, 0.15);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        .nav-item .icon {
            margin-right: 10px;
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .header .user-badge {
            background: var(--bg-card);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--success);
        }

        .content {
            flex: 1;
            padding: 24px 28px;
            overflow-y: auto;
        }

        /* Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(233, 69, 96, 0.15);
        }

        .card h3 {
            font-size: 15px;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Tables */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 16px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }

        .data-table th {
            background: rgba(255, 255, 255, 0.05);
            padding: 14px 20px;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover td {
            background: rgba(233, 69, 96, 0.05);
        }

        .card .meta {

            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .badge-type {
            background: rgba(0, 210, 255, 0.15);
            color: var(--success);
        }

        .badge-status {
            background: rgba(255, 193, 7, 0.15);
            color: var(--warning);
        }

        .badge-active {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }

        /* Buttons */
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
        }

        .btn-danger {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }

        /* Forms */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            width: 480px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h3 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* Chat */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Chat Mode - Immersive Layout */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 100px;
            /* 为固底输入框留空 */
        }

        .chat-msg {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .chat-msg.user {
            align-self: flex-end;
        }

        .chat-msg.assistant {
            align-self: flex-start;
        }

        .chat-bubble {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            white-space: pre-wrap;
        }

        .chat-msg.user .chat-bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-msg.assistant .chat-bubble {
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .chat-input-row {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 300px);
            max-width: 760px;
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 30px;
            display: flex;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            z-index: 100;
        }

        .chat-input-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 8px 16px;
            outline: none;
            font-size: 14px;
        }


        /* Instance detail */
        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 12px;
        }

        .section-card h4 {
            font-size: 14px;
            margin-bottom: 10px;
            color: var(--success);
        }

        .section-card pre {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .section-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h1>📊 报告系统</h1>
        <div class="nav-item active" onclick="switchTab('chat')"><span class="icon">💬</span>对话助手</div>
        <div class="nav-item" onclick="switchTab('templates')"><span class="icon">📋</span>模板管理</div>
        <div class="nav-item" onclick="switchTab('instances')"><span class="icon">📄</span>报告实例</div>
        <div class="nav-item" onclick="switchTab('documents')"><span class="icon">📑</span>报告文档</div>
        <div class="nav-item" onclick="switchTab('tasks')"><span class="icon">⏰</span>定时任务</div>
    </div>


    <div class="main">
        <div class="header">
            <h2 id="page-title">对话助手</h2>
            <span class="user-badge">👤 陆Sir (default)</span>
        </div>

        <div class="content" id="content"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-content"></div>
    </div>

    <script>
        const API = '/api';
        let currentTab = 'chat';
        let chatSessionId = '';

        let chatMessages = [];

        // --- Navigation ---
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
            const titles = { templates: '模板管理', instances: '报告实例', documents: '报告文档', tasks: '定时任务', chat: '对话助手' };
            document.getElementById('page-title').textContent = titles[tab];
            loadContent();
        }

        async function loadContent() {
            const c = document.getElementById('content');
            if (currentTab === 'chat') { renderChat(c); return; }
            if (currentTab === 'templates') { await renderTemplates(c); return; }
            if (currentTab === 'instances') { await renderInstances(c); return; }
            if (currentTab === 'documents') { await renderDocuments(c); return; }
            if (currentTab === 'tasks') { await renderTasks(c); return; }
        }

        // --- Templates ---
        async function renderTemplates(c) {
            const data = await fetch(`${API}/templates`).then(r => r.json());
            c.innerHTML = `
        <div class="toolbar">
            <button class="btn btn-primary" onclick="showCreateTemplate()">+ 新建模板</button>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>模板名称</th>
                        <th>场景</th>
                        <th>类型</th>
                        <th>创建时间</th>
                        <th style="text-align:right">操作</th>
                    </tr>
                </thead>
                <tbody>
                    ${data.length === 0 ? '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-secondary)">暂无模板数据</td></tr>' : ''}
                    ${data.map(t => `
                        <tr>
                            <td font-weight:600>${t.name}</td>
                            <td><span class="badge badge-status">${t.scenario || '通用'}</span></td>
                            <td><span class="badge badge-type">${t.report_type}</span></td>
                            <td style="color:var(--text-secondary);font-size:12px">${t.created_at}</td>
                            <td style="text-align:right">
                                <button class="btn btn-primary btn-sm" onclick="viewTemplate('${t.template_id}')">详情</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteTemplate('${t.template_id}')">删除</button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>`;
        }

        // --- Instances ---
        async function renderInstances(c) {
            const instances = await fetch(`${API}/instances`).then(r => r.json());
            const templates = await fetch(`${API}/templates`).then(r => r.json());
            const tplMap = {};
            templates.forEach(t => tplMap[t.template_id] = t.name);

            c.innerHTML = `
        <div class="toolbar">
            ${templates.length > 0
                    ? `<button class="btn btn-primary" onclick="showGenerateInstanceDialog()">+ 生成新报告</button>`
                    : '<span style="color:var(--text-secondary)">请先创建模板</span>'}
            <button class="btn btn-secondary btn-sm" onclick="loadContent()">强制刷新</button>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>报告名称</th>
                        <th>实例 ID</th>
                        <th>状态</th>
                        <th>生成时间</th>
                        <th style="text-align:right">操作</th>
                    </tr>
                </thead>
                <tbody>
                    ${instances.length === 0 ? '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-secondary)">暂无报告实例</td></tr>' : ''}
                    ${instances.map(inst => `
                        <tr>
                            <td style="font-weight:600">${tplMap[inst.template_id] || '未知模板'}</td>
                            <td style="font-family:monospace;font-size:12px;color:var(--text-secondary)">${inst.instance_id.slice(0, 8)}...</td>
                            <td><span class="badge ${inst.status === 'finalized' ? 'badge-active' : 'badge-status'}">${inst.status === 'finalized' ? '已定稿' : '草稿'}</span></td>
                            <td style="color:var(--text-secondary);font-size:12px">${inst.created_at}</td>
                            <td style="text-align:right">
                                <button class="btn btn-primary btn-sm" onclick="viewInstanceDetail('${inst.instance_id}')">进入详情</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteInst('${inst.instance_id}')">删除</button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>`;
        }

        // --- Documents ---
        async function renderDocuments(c) {
            const docs = await fetch(`${API}/documents`).then(r => r.json());
            c.innerHTML = `
        <div class="toolbar">
            <button class="btn btn-secondary btn-sm" onclick="loadContent()">刷新记录</button>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>导出类型</th>
                        <th>文件路径</th>
                        <th>大小</th>
                        <th>生成时间</th>
                        <th style="text-align:right">操作</th>
                    </tr>
                </thead>
                <tbody>
                    ${docs.length === 0 ? '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-secondary)">暂无导出的文档记录</td></tr>' : ''}
                    ${docs.map(d => `
                        <tr>
                            <td style="font-weight:600;color:var(--success)">${d.format.toUpperCase()}</td>
                            <td style="font-family:monospace;font-size:12px"><code>${d.file_path}</code></td>
                            <td><span class="badge badge-type">${(d.file_size / 1024).toFixed(1)} KB</span></td>
                            <td style="color:var(--text-secondary);font-size:12px">${d.created_at}</td>
                            <td style="text-align:right">
                                <button class="btn btn-primary btn-sm" onclick="alert('即将下载: ' + '${d.file_path}')">下载</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteDoc('${d.document_id}')">删除记录</button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>`;
        }



        async function deleteDoc(id) {
            await fetch(`${API}/documents/${id}`, { method: 'DELETE' });
            loadContent();
        }

        // --- Tasks ---
        async function renderTasks(c) {
            const tasks = await fetch(`${API}/scheduled-tasks?user_id=default`).then(r => r.json());
            const templates = await fetch(`${API}/templates`).then(r => r.json());
            c.innerHTML = `
        <div class="toolbar">
            <button class="btn btn-primary" onclick="showCreateTask()">+ 新建定时任务</button>
            <span style="font-size:12px;color:var(--text-secondary)">配额: ${tasks.length}/5</span>
        </div>
        ${tasks.length === 0 ? '<div class="empty-state"><div class="icon">⏰</div><p>暂无定时任务</p></div>' : ''}
        <div class="card-grid">
            ${tasks.map(t => `
                <div class="card">
                    <h3>${t.name}</h3>
                    <p>${t.description || '无描述'}</p>
                    <p style="font-size:12px;margin-top:6px">Cron: ${t.cron_expression || '无'} | 类型: ${t.schedule_type}</p>
                    <div class="meta">
                        <span class="badge ${t.status === 'active' ? 'badge-active' : 'badge-status'}">${t.status}</span>
                        <span class="badge badge-type">执行 ${t.total_runs} 次</span>
                    </div>
                    <div class="section-actions" style="margin-top:12px">
                        <button class="btn btn-primary btn-sm" onclick="runTaskNow('${t.task_id}')">立即执行</button>
                        <button class="btn btn-secondary btn-sm" onclick="${t.status === 'active' ? `pauseTask('${t.task_id}')` : `resumeTask('${t.task_id}')`}">${t.status === 'active' ? '暂停' : '恢复'}</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteTask('${t.task_id}')">删除</button>
                    </div>
                </div>
            `).join('')}
        </div>`;
        }

        function showCreateTask() {
            showModal(`
        <h3>新建定时任务</h3>
        <div class="form-group"><label>任务名称</label><input id="ft-name" placeholder="如：每日巡检"></div>
        <div class="form-group"><label>描述</label><input id="ft-desc" placeholder="任务描述"></div>
        <div class="form-group"><label>模板 ID</label><input id="ft-tpl" placeholder="关联的模板 ID"></div>
        <div class="form-group"><label>执行模式</label>
            <select id="ft-type"><option value="recurring">周期性</option><option value="once">一次性</option></select>
        </div>
        <div class="form-group"><label>Cron 表达式</label><input id="ft-cron" value="0 8 * * *" placeholder="0 8 * * *"></div>
        <div class="form-actions">
            <button class="btn btn-secondary" onclick="hideModal()">取消</button>
            <button class="btn btn-primary" onclick="createTask()">创建</button>
        </div>
    `);
        }

        async function createTask() {
            const res = await fetch(`${API}/scheduled-tasks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('ft-name').value,
                    description: document.getElementById('ft-desc').value,
                    template_id: document.getElementById('ft-tpl').value,
                    schedule_type: document.getElementById('ft-type').value,
                    cron_expression: document.getElementById('ft-cron').value,
                    user_id: 'default'
                })
            });
            if (!res.ok) { const e = await res.json(); alert(e.detail); return; }
            hideModal(); loadContent();
        }

        async function runTaskNow(id) {
            const res = await fetch(`${API}/scheduled-tasks/${id}/run-now`, { method: 'POST' }).then(r => r.json());
            alert(`任务已执行！新实例: ${res.instance_id}`);
            loadContent();
        }
        async function pauseTask(id) { await fetch(`${API}/scheduled-tasks/${id}/pause`, { method: 'POST' }); loadContent(); }
        async function resumeTask(id) { await fetch(`${API}/scheduled-tasks/${id}/resume`, { method: 'POST' }); loadContent(); }
        async function deleteTask(id) { await fetch(`${API}/scheduled-tasks/${id}`, { method: 'DELETE' }); loadContent(); }

        // --- Chat ---
        function renderChat(c) {
            c.innerHTML = `
        <div class="chat-container">
            <div id="chat-messages">
                ${chatMessages.length === 0 ? '<div class="empty-state" style="margin-top:100px"><div class="icon">💬</div><p>您好！我是您的智能报告助手。<br>您可以输入“帮我写个巡检报告”来开始。</p></div>' : ''}
                ${chatMessages.map((m, idx) => {
                const isUser = m.role === 'user';
                if (isUser) {
                    return `<div class="chat-msg user"><div class="chat-bubble">${m.content}</div></div>`;
                }
                // assistant message
                let html = `<div class="chat-msg assistant"><div class="chat-bubble">`;
                html += m.content;
                // 如果带有 action，渲染内嵌表单
                if (m.action && m.action.type === 'show_param_form') {
                    const a = m.action;
                    const formId = 'chat-form-' + idx;
                    html += `<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">`;
                    html += `<div style="font-weight:600;margin-bottom:12px;color:var(--success)">📋 ${a.template_name} - 参数配置</div>`;
                    const params = (a.content_params && a.content_params.length > 0) ? a.content_params : a.default_params;
                    params.forEach(p => {
                        const inputType = p.type === 'date' ? 'date' : 'text';
                        const defaultVal = p.default || '';
                        const placeholder = p.placeholder || '';
                        const required = p.required ? ' *' : '';
                        html += `<div class="form-group">`;
                        html += `<label>${p.label || p.name}${required}</label>`;
                        html += `<input type="${inputType}" data-param-name="${p.name}" class="${formId}-input" value="${defaultVal}" placeholder="${placeholder}" style="background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text-primary);width:100%;font-size:13px">`;
                        html += `</div>`;
                    });
                    html += `<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">`;
                    html += `<button class="btn btn-primary" onclick="submitChatForm('${a.template_id}','${formId}')">🚀 生成报告</button>`;
                    html += `</div></div>`;
                }
                html += `</div></div>`;
                return html;
            }).join('')}
            </div>
            <div class="chat-input-row">
                <input id="chat-input" placeholder="输入消息... 如：帮我生成设备巡检报告" onkeypress="if(event.key==='Enter')sendChat()">
                <button class="btn btn-primary" style="border-radius:20px;padding:6px 16px" onclick="sendChat()">发送</button>
            </div>
        </div>`;
            const el = document.getElementById('chat-messages');
            el.scrollTop = el.scrollHeight;
        }


        async function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';

            chatMessages.push({ role: 'user', content: msg });
            renderChat(document.getElementById('content'));

            const res = await fetch(`${API}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg, session_id: chatSessionId })
            }).then(r => r.json());

            chatSessionId = res.session_id;
            chatMessages.push({ role: 'assistant', content: res.reply, action: res.action || null });
            renderChat(document.getElementById('content'));
        }

        async function submitChatForm(templateId, formId) {
            const inputs = document.querySelectorAll('.' + formId + '-input');
            const params = {};
            inputs.forEach(inp => {
                params[inp.dataset.paramName] = inp.value;
            });

            // 添加生成中提示
            chatMessages.push({ role: 'assistant', content: '⏳ 正在为您生成报告，请稍候...' });
            renderChat(document.getElementById('content'));

            try {
                const res = await fetch(`${API}/instances`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ template_id: templateId, input_params: params })
                }).then(r => r.json());

                // 替换最后的提示消息
                chatMessages[chatMessages.length - 1] = {
                    role: 'assistant',
                    content: `✅ 报告已生成！共 ${(res.outline_content || []).length} 个章节。正在跳转到报告详情...`
                };
                renderChat(document.getElementById('content'));

                // 短暂延迟后跳转到实例详情
                setTimeout(() => { showInstanceDetail(res); }, 800);
            } catch (e) {
                chatMessages[chatMessages.length - 1] = {
                    role: 'assistant',
                    content: '❌ 生成失败，请检查参数后重试。'
                };
                renderChat(document.getElementById('content'));
            }
        }


        // --- Modal ---
        function showModal(html) {
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('modal-overlay').classList.add('show');
        }
        function hideModal() {
            document.getElementById('modal-overlay').classList.remove('show');
        }
        document.getElementById('modal-overlay').addEventListener('click', function (e) {
            if (e.target === this) hideModal();
        });

        // Init
        loadContent();
    </script>
</body>

</html>
