<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能报告系统（需求分析用Demo）</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0b8;
            --border: #2a2a4a;
            --success: #00d2ff;
            --warning: #ffc107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            flex: 0 0 220px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-height: 0;
        }

        .sidebar-header {
            padding: 24px 20px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar h1 {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .sidebar-body {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-nav {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 16px 0;
        }

        .sidebar-footer {
            border-top: 1px solid var(--border);
            padding: 14px 0 18px;
            flex-shrink: 0;
        }

        .sidebar-nav-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
        }

        .sidebar-nav-item:hover {
            background: rgba(233, 69, 96, 0.1);
            color: var(--text-primary);
        }

        .sidebar-nav-item.active {
            background: rgba(233, 69, 96, 0.15);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        .sidebar-nav-item .icon {
            margin-right: 10px;
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .header {
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .header .user-badge {
            background: var(--bg-card);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--success);
        }

        .content {
            flex: 1;
            padding: 24px 28px;
            overflow-y: auto;
            min-height: 0;
        }

        /* Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(233, 69, 96, 0.15);
        }

        .card h3 {
            font-size: 15px;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Tables */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 16px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }

        .data-table th {
            background: rgba(255, 255, 255, 0.05);
            padding: 14px 20px;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover td {
            background: rgba(233, 69, 96, 0.05);
        }

        .card .meta {

            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .badge-type {
            background: rgba(0, 210, 255, 0.15);
            color: var(--success);
        }

        .badge-status {
            background: rgba(255, 193, 7, 0.15);
            color: var(--warning);
        }

        .badge-active {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }

        /* Buttons */
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
        }

        .btn-danger {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }

        /* Forms */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            width: 480px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-lg {
            width: 1400px !important;
            max-width: 95vw !important;
            max-height: 92vh !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal h3 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* Chat */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Chat Mode - Immersive Layout */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 100px;
            /* 为固底输入框留空 */
        }

        .chat-msg {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .chat-msg.user {
            align-self: flex-end;
        }

        .chat-msg.assistant {
            align-self: flex-start;
        }

        .chat-bubble {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            white-space: pre-wrap;
        }

        .chat-msg.user .chat-bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-msg.assistant .chat-bubble {
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .chat-input-row {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 300px);
            max-width: 760px;
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 30px;
            display: flex;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            z-index: 100;
        }

        .chat-input-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 8px 16px;
            outline: none;
            font-size: 14px;
        }


        /* Instance detail */
        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 12px;
        }

        .section-card h4 {
            font-size: 14px;
            margin-bottom: 10px;
            color: var(--success);
        }

        .section-card pre {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .section-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .section-status-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .debug-panel {
            margin-top: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
        }

        .debug-panel summary {
            cursor: pointer;
            list-style: none;
            padding: 10px 14px;
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.04);
        }

        .debug-panel summary::-webkit-details-marker {
            display: none;
        }

        .debug-body {
            padding: 12px 14px 14px;
            display: grid;
            gap: 10px;
        }

        .debug-block {
            background: rgba(0, 0, 0, 0.18);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
        }

        .debug-block-title {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .debug-block pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text-primary);
            font-size: 12px;
            line-height: 1.6;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>📊 报告系统<div style="font-size:11px;color:var(--text-secondary);margin-top:4px;font-weight:400">（需求分析用Demo）
                    v1.6.0</div>
            </h1>
        </div>
        <div class="sidebar-body">
            <div class="sidebar-nav" id="sidebar-primary-nav"></div>
            <div class="sidebar-footer" id="sidebar-secondary-nav"></div>
        </div>
    </div>


    <div class="main">
        <div class="header">
            <h2 id="page-title">对话助手</h2>
            <div style="display:flex; gap:12px; align-items:center;">
                <button onclick="viewHelp()"
                    style="padding:6px 14px;font-size:13px;background:var(--bg-input);border:1px solid var(--border);color:var(--text-primary);border-radius:20px;cursor:pointer;transition:all 0.2s">❓
                    帮助</button>
                <span class="user-badge">👤 陆Sir (default)</span>
            </div>
        </div>

        <div class="content" id="content"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-content"></div>
    </div>

    <script>
        const API = '/api';
        const TAB_TITLES = {
            chat: '对话助手',
            templates: '模板管理',
            instances: '报告实例',
            documents: '报告文档',
            tasks: '定时任务',
            settings: '系统设置',
        };
        const PRIMARY_NAV_ITEMS = [
            { type: 'tab', tab: 'chat', icon: '💬', label: '对话助手' },
            { type: 'tab', tab: 'templates', icon: '📋', label: '模板管理' },
            { type: 'tab', tab: 'instances', icon: '📄', label: '报告实例' },
            { type: 'tab', tab: 'documents', icon: '📑', label: '报告文档' },
            { type: 'tab', tab: 'tasks', icon: '⏰', label: '定时任务' },
        ];
        const SECONDARY_NAV_ITEMS = [
            { type: 'tab', tab: 'settings', icon: '⚙️', label: '系统设置' },
            { type: 'action', action: 'feedback', icon: '💡', label: '提意见' },
        ];
        let currentTab = 'chat';
        let chatSessionId = '';
        let systemSettingsSnapshot = null;

        let chatMessages = [];

        async function fetchJson(url, options) {
            const res = await fetch(url, options);
            let data = null;
            try {
                data = await res.json();
            } catch (e) {
                data = null;
            }
            if (!res.ok) {
                throw new Error((data && (data.detail || data.error || data.message)) || `请求失败 (${res.status})`);
            }
            return data;
        }

        async function refreshSystemSettings(force = false) {
            if (!force && systemSettingsSnapshot) return systemSettingsSnapshot;
            try {
                systemSettingsSnapshot = await fetchJson(`${API}/system-settings`);
            } catch (e) {
                systemSettingsSnapshot = null;
            }
            return systemSettingsSnapshot;
        }

        // --- Navigation ---
        function renderSidebar() {
            const primary = document.getElementById('sidebar-primary-nav');
            const secondary = document.getElementById('sidebar-secondary-nav');
            if (!primary || !secondary) return;
            primary.innerHTML = PRIMARY_NAV_ITEMS.map(renderSidebarItem).join('');
            secondary.innerHTML = SECONDARY_NAV_ITEMS.map(renderSidebarItem).join('');
            setActiveNav(currentTab);
        }

        function renderSidebarItem(item) {
            const tabAttr = item.tab ? `data-nav-tab="${item.tab}"` : '';
            if (item.type === 'tab') {
                return `<div class="sidebar-nav-item" ${tabAttr} onclick="switchTab('${item.tab}')"><span class="icon">${item.icon}</span>${item.label}</div>`;
            }
            return `<div class="sidebar-nav-item" onclick="handleSidebarAction('${item.action}')"><span class="icon">${item.icon}</span>${item.label}</div>`;
        }

        function handleSidebarAction(action) {
            if (action === 'feedback') {
                showFeedbackModal();
            }
        }

        function setActiveNav(tab) {
            document.querySelectorAll('.sidebar-nav-item[data-nav-tab]').forEach(n => n.classList.remove('active'));
            const activeItem = document.querySelector(`.sidebar-nav-item[data-nav-tab="${tab}"]`);
            if (activeItem) activeItem.classList.add('active');
        }

        function switchTab(tab) {
            currentTab = tab;
            setActiveNav(tab);
            document.getElementById('page-title').textContent = TAB_TITLES[tab] || '智能报告系统';
            loadContent();
        }

        async function loadContent() {
            const c = document.getElementById('content');
            if (currentTab === 'chat') { await renderChat(c); return; }
            if (currentTab === 'templates') { await renderTemplates(c); return; }
            if (currentTab === 'instances') { await renderInstances(c); return; }
            if (currentTab === 'documents') { await renderDocuments(c); return; }
            if (currentTab === 'tasks') { await renderTasks(c); return; }
            if (currentTab === 'settings') { await renderSettings(c); return; }
            currentTab = 'chat';
            setActiveNav(currentTab);
            document.getElementById('page-title').textContent = TAB_TITLES[currentTab];
            await renderChat(c);
        }

        // --- Templates ---
        async function renderTemplates(c) {
            const data = await fetch(`${API}/templates`).then(r => r.json());
            c.innerHTML = `
        <div class="toolbar">
            <button class="btn btn-primary" onclick="showCreateTemplate()">+ 新建模板</button>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>模板名称</th>
                        <th>场景</th>
                        <th>类型</th>
                        <th>创建时间</th>
                        <th style="text-align:right">操作</th>
                    </tr>
                </thead>
                <tbody>
                    ${data.length === 0 ? '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-secondary)">暂无模板数据</td></tr>' : ''}
                    ${data.map(t => `
                        <tr>
                            <td font-weight:600>${t.name}</td>
                            <td><span class="badge badge-status">${t.scene || t.scenario || '通用'}</span></td>
                            <td><span class="badge badge-type">${t.type || t.report_type}</span></td>
                            <td style="color:var(--text-secondary);font-size:12px">${t.created_at}</td>
                            <td style="text-align:right">
                                <button class="btn btn-primary btn-sm" onclick="viewTemplate('${t.template_id}')">详情</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteTemplate('${t.template_id}')">删除</button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>`;
        }

        function showCreateTemplate() {
            showModal(`
                <h3>新建报告模板</h3>
                <div class="form-group">
                    <label>模板名称</label>
                    <input id="tmpl-name" placeholder="如：周度运营分析报告">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <input id="tmpl-desc" placeholder="简要说明模板用途">
                </div>
                <div class="form-group">
                    <label>场景</label>
                    <input id="tmpl-scenario" placeholder="如：设备监控 / 业务分析">
                </div>
                <div class="form-group">
                    <label>匹配关键词 / 别名</label>
                    <textarea id="tmpl-match-keywords" rows="3" placeholder="用逗号或换行分隔，如：资产, 资产信息, 资产统计, 资产台账" style="width:100%;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px;resize:vertical"></textarea>
                    <div style="font-size:11px;color:var(--text-secondary);margin-top:4px">这些词只参与模板匹配，不会直接写进报告正文。</div>
                </div>
                <div class="form-group">
                    <label>报告类型</label>
                    <select id="tmpl-type">
                        <option value="daily">日报 (Daily)</option>
                        <option value="weekly">周报 (Weekly)</option>
                        <option value="special">专项报告 (Special)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>模板类型 (v2)</label>
                    <input id="tmpl-template-type" placeholder="如：设备健康评估 / 资产统计">
                    <div style="font-size:11px;color:var(--text-secondary);margin-top:4px">用于新模板规范的 type 字段，不影响旧模板。</div>
                </div>

                <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                        <label style="margin:0;font-weight:600;font-size:14px">📋 报告大纲</label>
                        <button class="btn btn-secondary btn-sm" onclick="addOutlineSection('tmpl-outline')" style="padding:4px 10px;font-size:11px">+ 添加章节</button>
                    </div>
                    <div id="tmpl-outline">
                        <div class="outline-item" data-level="1" style="display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;padding:10px;background:var(--bg-secondary);border-radius:8px;border-left:3px solid var(--accent);margin-left:0px;transition:margin-left 0.2s">
                            <div style="display:flex;flex-direction:column;gap:4px;padding-top:4px">
                                <button onclick="changeOutlineLevel(this,-1)" title="向左缩进" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:2px">◂</button>
                                <button onclick="changeOutlineLevel(this,1)" title="向右缩进" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:2px">▸</button>
                            </div>
                            <div style="flex:1">
                                <input class="outline-title" value="执行摘要" placeholder="章节标题" style="width:100%;margin-bottom:4px;padding:6px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-size:13px;font-weight:600">

                    </div>
                    <div style="font-size:11px;color:var(--text-secondary)">填写任意一项即按 v2.0 模板规范保存，后端会校验 schema，并将旧的单 source 自动归一化到 content.datasets。</div>

        function changeOutlineLevel(btn, delta) {
            const item = btn.closest('.outline-item');
            let level = parseInt(item.dataset.level || 1);
            level += delta;
            if (level < 1) level = 1;
            if (level > 4) level = 4; // max level
            item.dataset.level = level;
            item.style.marginLeft = ((level - 1) * 24) + 'px';
        }

        function addOutlineSection(containerId) {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = 'outline-item';
            div.dataset.level = 1;
            div.style.cssText = 'display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;padding:10px;background:var(--bg-secondary);border-radius:8px;border-left:3px solid var(--accent);margin-left:0px;transition:margin-left 0.2s';
            div.innerHTML = `
                <div style="display:flex;flex-direction:column;gap:4px;padding-top:4px">
                    <button onclick="changeOutlineLevel(this,-1)" title="向左缩进" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:2px">◂</button>
                    <button onclick="changeOutlineLevel(this,1)" title="向右缩进" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:2px">▸</button>
                </div>
                <div style="flex:1">
                    <input class="outline-title" value="" placeholder="章节标题" style="width:100%;margin-bottom:4px;padding:6px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-size:13px;font-weight:600">
                    <input class="outline-desc" value="" placeholder="章节描述（可选）" style="width:100%;padding:6px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);font-size:12px">
                </div>
                <div style="display:flex;flex-direction:column;gap:2px">
                    <button onclick="moveOutlineItem(this,-1)" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:11px;padding:2px">▲</button>
                    <button onclick="removeOutlineItem(this)" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:2px">✕</button>
                    <button onclick="moveOutlineItem(this,1)" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:11px;padding:2px">▼</button>
                </div>`;
            container.appendChild(div);
            attachOutlineBindingPanels(containerId);
        }

        function attachOutlineBindingPanels(containerId) {
            const items = document.querySelectorAll(`#${containerId} .outline-item`);
            items.forEach(item => {
                if (item.querySelector('.outline-binding-panel')) return;
                const panel = document.createElement('div');
                panel.className = 'outline-binding-panel';
                panel.style.cssText = 'margin-top:8px;padding:8px;background:rgba(255,255,255,0.03);border:1px dashed var(--border);border-radius:6px';
                panel.innerHTML = `
                    <div style="font-size:11px;color:var(--text-secondary);margin-bottom:6px">参数联动配置（运行时展开）</div>
                    <div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
                        <label style="font-size:11px;color:var(--text-secondary);min-width:56px">生成模式</label>
                        <select class="outline-mode" onchange="toggleOutlineMode(this)" style="flex:1;padding:5px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:11px">
                            <option value="once">单次章节</option>
                            <option value="repeat">按列表重复</option>
                        </select>
                    </div>
                    <input class="outline-repeat-source" placeholder="重复来源参数（列表），如 devices" style="width:100%;margin-bottom:6px;padding:5px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:11px;display:none">
                    <input class="outline-title-template" placeholder="标题模板：如 设备 {{item}} 巡检" style="width:100%;margin-bottom:6px;padding:5px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:11px">
                    <input class="outline-desc-template" placeholder="描述模板：如 第 {{index}} 台设备" style="width:100%;margin-bottom:6px;padding:5px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:11px">
                    <div style="display:flex;gap:6px;margin-bottom:6px">
                        <input class="outline-binding-title" placeholder="bindings.title 路径，如 item" style="flex:1;padding:5px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:11px">
                        <input class="outline-binding-desc" placeholder="bindings.description 路径，如 item.desc" style="flex:1;padding:5px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:11px">
                    </div>
                    <div style="font-size:11px;color:var(--text-secondary)">变量说明：{{item}} / {{index}} 仅在“按列表重复”模式下生效，来源于上方“重复来源参数”。</div>
                `;
                item.querySelector('div[style*="flex:1"]').appendChild(panel);
            });
        }

        function toggleOutlineMode(selectEl) {
            const panel = selectEl.closest('.outline-binding-panel');
            if (!panel) return;
            const repeatInput = panel.querySelector('.outline-repeat-source');
            const repeat = selectEl.value === 'repeat';
            repeatInput.style.display = repeat ? 'block' : 'none';
            if (!repeat) repeatInput.value = '';
        }


        function removeOutlineItem(btn) {
            const item = btn.closest('.outline-item');
            if (item.parentElement.querySelectorAll('.outline-item').length <= 1) {
                alert('至少保留一个章节');
                return;
            }
            item.remove();
        }

        function moveOutlineItem(btn, dir) {
            const item = btn.closest('.outline-item');
            const container = item.parentElement;
            if (dir === -1 && item.previousElementSibling) {
                container.insertBefore(item, item.previousElementSibling);
            } else if (dir === 1 && item.nextElementSibling) {
                container.insertBefore(item.nextElementSibling, item);
            }
        }

        function collectOutline(containerId) {
            const items = document.querySelectorAll(`#${containerId} .outline-item`);
            return Array.from(items).map(item => {
                const title = item.querySelector('.outline-title').value.trim();
                const description = item.querySelector('.outline-desc')?.value.trim() || '';
                const titleTemplate = item.querySelector('.outline-title-template')?.value.trim() || '';
                const descriptionTemplate = item.querySelector('.outline-desc-template')?.value.trim() || '';
                const mode = item.querySelector('.outline-mode')?.value || 'once';
                const repeatSource = item.querySelector('.outline-repeat-source')?.value.trim() || '';
                const bindingTitle = item.querySelector('.outline-binding-title')?.value.trim() || '';
                const bindingDesc = item.querySelector('.outline-binding-desc')?.value.trim() || '';

                const obj = {
                    title,
                    description,
                    level: parseInt(item.dataset.level || 1)
                };
                if (titleTemplate) obj.title_template = titleTemplate;
                if (descriptionTemplate) obj.description_template = descriptionTemplate;
                if (mode === 'repeat' && repeatSource) {
                    obj.repeat = {
                        enabled: true,
                        source_param: repeatSource,
                        item_alias: 'item',
                        index_alias: 'index'
                    };
                }
                if (bindingTitle || bindingDesc) {
                    obj.bindings = {};
                    if (bindingTitle) obj.bindings.title = bindingTitle;
                    if (bindingDesc) obj.bindings.description = bindingDesc;
                }
                return obj;
            }).filter(o => o.title);
        }

        function parseMatchKeywords(raw) {
            const parts = String(raw || '')
                .split(/[\n,，;；]+/)
                .map(item => item.trim())
                .filter(Boolean);
            return Array.from(new Set(parts));
        }

        function parseJsonField(id, label) {
            const raw = document.getElementById(id)?.value?.trim();
            if (!raw) return null;
            try {
                return JSON.parse(raw);
            } catch (e) {
                alert(`${label} JSON 无效，请检查格式。`);
                throw e;
            }
        }

        async function createTemplate() {
            const outline = collectOutline('tmpl-outline');
            const parametersJson = parseJsonField('tmpl-parameters-json', 'parameters');
            const sectionsJson = parseJsonField('tmpl-sections-json', 'sections');
            const v2Enabled = Array.isArray(parametersJson) || Array.isArray(sectionsJson);
            if (outline.length === 0 && !v2Enabled) { alert('请至少添加一个大纲章节'); return; }

            const data = {
                name: document.getElementById('tmpl-name').value,
                description: document.getElementById('tmpl-desc').value,
                scenario: document.getElementById('tmpl-scenario').value,
                scene: document.getElementById('tmpl-scenario').value,
                type: document.getElementById('tmpl-template-type').value,
                match_keywords: parseMatchKeywords(document.getElementById('tmpl-match-keywords').value),
                report_type: document.getElementById('tmpl-type').value,
                content_params: v2Enabled ? [] : [
                    { name: "date", label: "日期", type: "date", required: true, default: "" },
                    { name: "devices", label: "涉及设备", type: "text", required: true, default: "", placeholder: "如：Router-001, Switch-001" }
                ],
                parameters: parametersJson || [],
                outline: outline,
                sections: sectionsJson || [],
                schema_version: v2Enabled ? 'v2.0' : ''
            };

            const res = await fetch(`${API}/templates`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                hideModal();
                loadContent();
            } else {
                const err = await res.json();
                alert('创建失败: ' + (err.detail || '未知错误'));
            }
        }


        async function viewTemplate(id) {
            const t = await fetch(`${API}/templates/${id}`).then(r => r.json());
            const keywordHtml = (t.match_keywords || []).length > 0
                ? (t.match_keywords || []).map(keyword => `
                    <span class="badge" style="background:rgba(16,185,129,0.14);color:var(--success)">${keyword}</span>
                `).join('')
                : '<span style="font-size:12px;color:var(--text-secondary)">未配置</span>';
            const parameterDefs = (t.parameters && t.parameters.length > 0) ? t.parameters : (t.content_params || []);
            const parameterHtml = parameterDefs.length > 0
                ? parameterDefs.map(param => {
                    const paramId = param.id || param.name || '-';
                    const label = param.label || paramId;
                    const inputType = param.input_type || param.type || 'free_text';
                    const extraTags = [
                        inputType,
                        param.required ? '必填' : '选填',
                        param.multi ? '多选' : '',
                    ].filter(Boolean).join(' / ');
                    return `

                                <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">${paramId}</div>
                            </div>
                            <span class="badge" style="background:rgba(0,210,255,0.15);color:var(--success)">${extraTags}</span>
                        </div>
                    </div>`;
                }).join('')
                : '<div style="color:var(--text-secondary);font-size:12px">暂无参数定义</div>';
            const outlineHtml = (t.outline || []).length > 0
                ? (t.outline || []).map((s, i) => {
                    const l = s.level || 1;
                    const ml = (l - 1) * 24;
                    const prefix = l > 1 ? '<span style="color:var(--text-secondary);margin-right:4px">↳</span>' : '';
                    return `
                    <div style="display:flex;gap:8px;align-items:center;padding:8px 12px;background:var(--bg-secondary);border-radius:6px;margin-bottom:4px;border-left:3px solid var(--accent);margin-left:${ml}px">

                        <div>
                            <strong style="font-size:13px;color:var(--text-primary)">${s.title}</strong>
                            <div style="font-size:11px;color:var(--text-secondary);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap">
                                <span class="badge" style="background:rgba(0,210,255,0.15);color:var(--success)">${(s.repeat && s.repeat.enabled) ? `重复章节 · ${s.repeat.source_param || '未指定参数'}` : '单次章节'}</span>
                                ${(s.repeat && s.repeat.enabled) ? `<span class="badge" style="background:rgba(255,193,7,0.15);color:var(--warning)">{{item}}/{{index}} 来源: ${s.repeat.source_param || '-'}</span>` : ''}
                            </div>
                            ${s.description ? `<div style="font-size:11px;color:var(--text-secondary);margin-top:4px">${s.description}</div>` : ''}
                        </div>
                    </div>`;
                }).join('')
                : '<div style="color:var(--text-secondary);font-size:12px">暂无大纲定义</div>';
            const sectionHtml = (t.sections || []).length > 0
                ? (t.sections || []).map((section, index) => {
                    const datasetCount = Array.isArray(section?.content?.datasets) ? section.content.datasets.length : 0;
                    const presentationType = section?.content?.presentation?.type || '未配置';
                    return `
                    <div style="padding:10px 12px;background:var(--bg-secondary);border-radius:6px;margin-bottom:6px;border-left:3px solid var(--success)">
                        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
                            <div>
                                <strong style="font-size:13px;color:var(--text-primary)">${index + 1}. ${section.title || '未命名章节'}</strong>

                }).join('')
                : outlineHtml;

            showModal(`
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                    <h3 style="margin:0">${t.name}</h3>
                    <span class="badge badge-type">${t.report_type}</span>
                </div>
                <p style="color:var(--text-secondary);margin-bottom:20px">${t.description || '暂无描述'}</p>
                <div style="background:var(--bg-secondary);padding:12px;border-radius:8px;font-size:12px;margin-bottom:16px">
                    <div style="margin-bottom:8px"><strong>模板类型:</strong> ${t.type || t.report_type || '未设置'}</div>
                    <div style="margin-bottom:8px"><strong>场景:</strong> ${t.scene || t.scenario || '通用'}</div>
                    <div style="margin-bottom:8px"><strong>Schema 版本:</strong> ${t.schema_version || 'legacy'}</div>
                    <div style="margin-bottom:8px"><strong>匹配关键词:</strong> <span style="display:inline-flex;gap:6px;flex-wrap:wrap;vertical-align:top">${keywordHtml}</span></div>

                    <div style="margin-bottom:8px"><strong>参数数量:</strong> ${((t.parameters && t.parameters.length) ? t.parameters.length : (t.content_params || []).length)}</div>
                    <div><strong>创建时间:</strong> ${t.created_at}</div>

                <div style="margin-bottom:16px">
                    <div style="font-weight:600;font-size:14px;margin-bottom:8px">🧩 参数定义 (${parameterDefs.length} 项)</div>

                <div style="margin-bottom:16px">
                    <div style="font-weight:600;font-size:14px;margin-bottom:8px">📋 章节定义 (${(t.sections && t.sections.length) ? t.sections.length : (t.outline || []).length} 项)</div>

                </div>
            `);
        }

        async function generateMarkdownFromSelection() {
            const select = document.getElementById('doc-instance-select');
            const instanceId = select ? select.value : '';
            if (!instanceId) {
                alert('请先选择一个报告实例。');
                return;
            }
            await generateMarkdownDocument(instanceId, true);
        }

        async function generateMarkdownDocument(instanceId, autoDownload = true) {
            const doc = await fetchJson(`${API}/documents`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ instance_id: instanceId, format: 'markdown' }),
            });
            if (currentTab === 'documents') {
                await loadContent();
            }
            if (autoDownload) {
                downloadDoc(doc.document_id);
            }
            return doc;
        }

        function downloadDoc(documentId) {
            const link = document.createElement('a');
            link.href = `${API}/documents/${documentId}/download`;
            link.target = '_blank';
            link.rel = 'noopener';
            document.body.appendChild(link);
            link.click();
            link.remove();
        }

        async function deleteDoc(id) {
            await fetchJson(`${API}/documents/${id}`, { method: 'DELETE' });
            await loadContent();
        }

        // --- Tasks ---

                                </div>
                                <div style="font-size:11px;color:var(--text-secondary);font-weight:normal;margin-top:4px">${t.description || '无描述'}</div>

        async function showCreateTask() {
            // 异步加载实例和模板数据
            const instances = await fetch(`${API}/instances`).then(r => r.json());
            const templates = await fetch(`${API}/templates`).then(r => r.json());
            const tplMap = {};
            templates.forEach(t => tplMap[t.template_id] = t.name);

            const instanceOptions = instances.length === 0
                ? '<option value="">暂无可用实例，请先生成报告</option>'
                : instances.map(inst => {
                    const tplName = tplMap[inst.template_id] || '未知模板';
                    const shortId = inst.instance_id.slice(0, 8);
                    const statusLabel = inst.status === 'finalized' ? '已定稿' : '草稿';
                    return `<option value="${inst.instance_id}" data-tpl-id="${inst.template_id}" data-tpl-name="${tplName}">${tplName} (${shortId}... | ${statusLabel})</option>`;
                }).join('');

            showModal(`

        <div class="form-group">
            <label>关联报告实例</label>
            <select id="ft-instance" onchange="onTaskInstanceChange()" style="width:100%;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px">

        </div>
        <div id="ft-tpl-info" style="display:none;padding:10px 14px;background:var(--bg-secondary);border-radius:8px;margin-bottom:12px;font-size:12px;border-left:3px solid var(--accent)">
            <span style="color:var(--text-secondary)">来自模板：</span>
            <strong id="ft-tpl-name" style="color:var(--success)"></strong>
            <input type="hidden" id="ft-tpl-id">
        </div>
        <div class="form-group"><label>执行模式</label>
            <select id="ft-type" style="width:100%;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px"><option value="recurring">周期性</option><option value="once">一次性</option></select>

        function onTaskInstanceChange() {
            const sel = document.getElementById('ft-instance');
            const infoDiv = document.getElementById('ft-tpl-info');
            const opt = sel.options[sel.selectedIndex];
            if (sel.value && opt.dataset.tplName) {
                document.getElementById('ft-tpl-name').textContent = opt.dataset.tplName;
                document.getElementById('ft-tpl-id').value = opt.dataset.tplId;
                infoDiv.style.display = 'block';
            } else {
                infoDiv.style.display = 'none';
            }
        }

        async function createTask() {
            const instanceId = document.getElementById('ft-instance').value;
            const templateId = document.getElementById('ft-tpl-id').value;
            if (!instanceId) { alert('请先选择一个报告实例'); return; }

            const res = await fetch(`${API}/scheduled-tasks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('ft-name').value,
                    description: document.getElementById('ft-desc').value,
                    source_instance_id: instanceId,
                    template_id: templateId,
                    schedule_type: document.getElementById('ft-type').value,
                    cron_expression: document.getElementById('ft-cron').value,
                    user_id: 'default'
                })
            });
            if (!res.ok) { const e = await res.json(); alert(e.detail); return; }
            hideModal(); loadContent();
        }


        async function runTaskNow(id) {
            try {
                const res = await fetchJson(`${API}/scheduled-tasks/${id}/run-now`, { method: 'POST' });
                alert(`任务已执行！新实例: ${res.instance_id}`);
                loadContent();
            } catch (e) {
                alert(`任务执行失败: ${e.message}`);
            }
        }
        async function pauseTask(id) { await fetchJson(`${API}/scheduled-tasks/${id}/pause`, { method: 'POST' }); loadContent(); }
        async function resumeTask(id) { await fetchJson(`${API}/scheduled-tasks/${id}/resume`, { method: 'POST' }); loadContent(); }
        async function deleteTask(id) { await fetchJson(`${API}/scheduled-tasks/${id}`, { method: 'DELETE' }); loadContent(); }

        // --- Settings ---

                <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary)"><input id="settings-embedding-clear-api-key" type="checkbox"> 清空已保存的 Embedding API Key</label>
            </div>
        </div>
        <div class="toolbar" style="margin-top:20px;flex-wrap:wrap">

        function toggleEmbeddingAuth() {
            const reuse = document.getElementById('settings-embedding-use-completion-auth');
            const baseUrl = document.getElementById('settings-embedding-base-url');
            const apiKey = document.getElementById('settings-embedding-api-key');
            const clearBox = document.getElementById('settings-embedding-clear-api-key');
            if (!reuse || !baseUrl || !apiKey || !clearBox) return;
            const disabled = reuse.checked;
            baseUrl.disabled = disabled;
            apiKey.disabled = disabled;
            clearBox.disabled = disabled;
        }

        function collectSettingsPayload() {
            return {
                completion: {
                    base_url: document.getElementById('settings-completion-base-url').value.trim(),
                    model: document.getElementById('settings-completion-model').value.trim(),
                    api_key: document.getElementById('settings-completion-api-key').value.trim() || null,
                    clear_api_key: document.getElementById('settings-completion-clear-api-key').checked,
                    temperature: parseFloat(document.getElementById('settings-completion-temperature').value || '0.2'),
                    timeout_sec: parseInt(document.getElementById('settings-completion-timeout').value || '60', 10)
                },
                embedding: {
                    base_url: document.getElementById('settings-embedding-base-url').value.trim(),
                    model: document.getElementById('settings-embedding-model').value.trim(),
                    api_key: document.getElementById('settings-embedding-api-key').value.trim() || null,
                    clear_api_key: document.getElementById('settings-embedding-clear-api-key').checked,
                    timeout_sec: parseInt(document.getElementById('settings-embedding-timeout').value || '60', 10),
                    use_completion_auth: document.getElementById('settings-embedding-use-completion-auth').checked,
                }
            };
        }

        async function saveSystemSettings() {
            try {
                await fetchJson(`${API}/system-settings`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(collectSettingsPayload())
                });
                await renderSettings(document.getElementById('content'));
                document.getElementById('settings-test-result').innerHTML = '<span style="color:var(--success)">✅ 设置已保存，模板索引已标记为 stale，请执行“重建模板索引”。</span>';
            } catch (e) {
                document.getElementById('settings-test-result').innerHTML = `<span style="color:#ff6b81">❌ ${e.message}</span>`;
            }
        }

        async function testSystemSettings(target) {
            try {
                const result = await fetchJson(`${API}/system-settings/test`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target })
                });
                const parts = [];
                if (result.completion) {
                    parts.push(result.completion.ok
                        ? `Completion: 成功 (${result.completion.model})`
                        : `Completion: 失败 - ${result.completion.error}`);
                }
                if (result.embedding) {
                    parts.push(result.embedding.ok
                        ? `Embedding: 成功 (${result.embedding.model}, dim=${result.embedding.dimension})`
                        : `Embedding: 失败 - ${result.embedding.error}`);
                }
                document.getElementById('settings-test-result').innerHTML = `<span style="color:${parts.some(item => item.includes('失败')) ? '#ff9f43' : 'var(--success)'}">${parts.join(' | ')}</span>`;
            } catch (e) {
                document.getElementById('settings-test-result').innerHTML = `<span style="color:#ff6b81">❌ ${e.message}</span>`;
            }
        }

        async function reindexTemplateIndices() {
            try {
                const result = await fetchJson(`${API}/system-settings/reindex`, { method: 'POST' });
                await renderSettings(document.getElementById('content'));
                document.getElementById('settings-test-result').innerHTML = `<span style="color:var(--success)">✅ ${result.message}</span>`;
            } catch (e) {
                document.getElementById('settings-test-result').innerHTML = `<span style="color:#ff6b81">❌ ${e.message}</span>`;
            }
        }

                    html += `<div style="font-size:12px;color:var(--text-secondary)">已收集 ${progress.collected}/${progress.required}</div>`;

                    }
                    html += `<div style="display:grid;gap:8px">`;
                    (a.params || []).forEach(param => {

                    html += `<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">`;

                    html += `<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">`;

                    html += `</div></div>`;

                if (m.action && m.action.type === 'show_param_form') {
                    const a = m.action;

                    const disabledStr = a.submitted ? 'disabled' : '';
                    html += `<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">`;
                    html += `<div style="font-weight:600;margin-bottom:12px;color:var(--success)">📋 ${a.template_name} - 参数配置</div>`;

                        html += `</div>`;
                    });
                    html += `<div style="margin-top:16px"><div style="font-weight:600;font-size:13px;margin-bottom:8px">📋 报告大纲预览 & 自定义</div>`;

                    (a.outline || []).forEach((s, s_idx) => {
                        html += `
                        <div class="chat-outline-item" style="display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;padding:8px;background:var(--bg-secondary);border-radius:6px;border-left:3px solid var(--accent)">
                            <div style="flex:1">
                                <input class="outline-title" ${disabledStr} value="${s.title}" placeholder="章节标题" style="width:100%;margin-bottom:4px;padding:4px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:12px;font-weight:600">
                                <input class="outline-desc" ${disabledStr} value="${s.description || ''}" placeholder="描述（可选）" style="width:100%;padding:4px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-secondary);font-size:11px">
                            </div>
                            ${!a.submitted ? `<button onclick="this.closest('.chat-outline-item').remove()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:12px;padding:2px">✕</button>` : ''}

                    });
                    html += `</div>`;
                    if (!a.submitted) {
                        html += `<button class="btn btn-secondary btn-sm" onclick="addChatOutlineSection('${formId}-outline-container')" style="padding:4px 8px;font-size:11px">+ 添加章节</button>`;

                    html += `</div>`;
                    if (!a.submitted) {
                        html += `<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">`;
                        html += `<button class="btn btn-primary" onclick="submitChatForm('${a.template_id}','${formId}')">🚀 生成报告</button>`;
                        html += `</div></div>`;
                    } else {
                        html += `<div style="margin-top:12px;color:var(--text-secondary);font-size:12px;text-align:right">✅ 已提交生成</div></div>`;

                }
                html += `</div></div>`;
                return html;
            }).join('')}
            </div>
            <div class="chat-input-row">
                <input id="chat-input" placeholder="${settings?.is_ready ? '输入消息... 如：帮我生成设备巡检报告' : '请先完成系统设置，再开始真实对话'}" onkeypress="if(event.key==='Enter')sendChat()">
                <button class="btn btn-primary" style="border-radius:20px;padding:6px 16px" onclick="sendChat()">发送</button>
            </div>
        </div>`;
            const el = document.getElementById('chat-messages');
            if (el) el.scrollTop = el.scrollHeight;
        }

        function buildParamFormAction(template) {
            return {
                type: 'show_param_form',
                template_id: template.template_id,
                template_name: template.name,
                scenario: template.scenario || '',
                content_params: template.content_params || [],
                outline: template.outline || [],
                default_params: [
                    { name: 'date', label: '报告日期', type: 'date', required: true, default: '' },
                    { name: 'devices', label: '设备列表', type: 'text', required: true, default: 'Router-001, Switch-001', placeholder: '用逗号分隔多台设备' },
                ]
            };
        }

        function getSelectedCandidate(action) {
            const candidates = Array.isArray(action?.candidates) ? action.candidates : [];
            if (candidates.length === 0) return null;
            const selectedId = action?.selected_template_id || candidates[0].template_id;
            return candidates.find(item => item.template_id === selectedId) || candidates[0];
        }

        function buildCandidateOptionLabel(item) {
            const reasons = item.match_reasons || [];
            const firstReason = reasons.length > 0 ? reasons[0] : '语义相似度命中';
            const label = item.score_label || '中相关';
            return `${item.template_name} · ${label} · ${firstReason}`;
        }

        function buildCandidateMeta(item) {
            const parts = [];
            if (item.template_type) parts.push(`模板类型：${item.template_type}`);
            if (item.scenario) parts.push(`场景：${item.scenario}`);
            if (item.report_type) parts.push(`报告类型：${item.report_type}`);
            if (item.description) parts.push(`说明：${item.description}`);
            return parts.length > 0 ? parts.join(' / ') : '通用模板';
        }

        function formatChatParamValue(value) {
            if (Array.isArray(value)) return value.join('、');
            if (value === null || value === undefined || value === '') return '未填写';
            return String(value);
        }

        function buildParamWidgetControl(action, messageIndex) {
            const param = action?.param || {};
            const widget = action?.widget || {};
            const options = Array.isArray(param.options) ? param.options : [];
            const selectedValues = Array.isArray(action?.selected_values) ? action.selected_values : [];
            const inputId = `param-input-${messageIndex}`;

            if (widget.kind === 'single_select') {
                return `
                    <select id="${inputId}" style="flex:1;min-width:260px;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px">
                        <option value="">请选择</option>
                        ${options.map(option => `<option value="${escapeHtml(option)}" ${selectedValues[0] === option ? 'selected' : ''}>${escapeHtml(option)}</option>`).join('')}
                    </select>
                `;
            }
            if (widget.kind === 'multi_select') {
                const size = Math.max(3, Math.min(options.length || 3, 6));
                return `
                    <div style="flex:1;min-width:260px">
                        <select id="${inputId}" multiple size="${size}" style="width:100%;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px">
                            ${options.map(option => `<option value="${escapeHtml(option)}" ${selectedValues.includes(option) ? 'selected' : ''}>${escapeHtml(option)}</option>`).join('')}
                        </select>
                        <div style="font-size:11px;color:var(--text-secondary);margin-top:4px">可多选，按住 Ctrl 或 Command 选择多个值。</div>
                    </div>
                `;
            }
            if (widget.kind === 'date') {
                return `<input id="${inputId}" type="date" value="${escapeHtml(selectedValues[0] || '')}" style="flex:1;min-width:260px;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px">`;
            }
            return `<input id="${inputId}" type="text" value="${escapeHtml(selectedValues[0] || '')}" placeholder="请输入参数值" style="flex:1;min-width:260px;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px">`;
        }

        function readParamWidgetValue(messageIndex, action) {
            const widget = action?.widget || {};
            const input = document.getElementById(`param-input-${messageIndex}`);
            if (!input) return null;
            if (widget.kind === 'multi_select') {
                return Array.from(input.selectedOptions || []).map(option => option.value).filter(Boolean);
            }
            return input.value.trim();
        }

        async function updateCandidateSelection(messageIndex, templateId) {
            const message = chatMessages[messageIndex];
            if (!message || !message.action || message.action.type !== 'show_template_candidates') return;
            message.action.selected_template_id = templateId;
            await renderChat(document.getElementById('content'));
        }

        async function selectTemplateCandidate(messageIndex, templateId = '') {
            const message = chatMessages[messageIndex];
            const action = message?.action || {};
            const selectedCandidate = getSelectedCandidate(action);
            const resolvedTemplateId = templateId || action.selected_template_id || selectedCandidate?.template_id;
            if (!resolvedTemplateId) {
                chatMessages.push({ role: 'assistant', content: '❌ 当前没有可用的候选模板。' });
                await renderChat(document.getElementById('content'));
                return;
            }
            try {
                const res = await fetchJson(`${API}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: '', session_id: chatSessionId, selected_template_id: resolvedTemplateId })
                });
                chatSessionId = res.session_id;
                chatMessages.push({ role: 'assistant', content: res.reply, action: res.action || null });
                await renderChat(document.getElementById('content'));
            } catch (e) {
                chatMessages.push({ role: 'assistant', content: `❌ 无法加载模板详情：${e.message}` });
                await renderChat(document.getElementById('content'));
            }
        }

        function addChatOutlineSection(containerId) {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = 'chat-outline-item';
            div.style.cssText = 'display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;padding:8px;background:var(--bg-secondary);border-radius:6px;border-left:3px solid var(--accent)';
            div.innerHTML = `
                <div style="flex:1">
                    <input class="outline-title" value="" placeholder="章节标题" style="width:100%;margin-bottom:4px;padding:4px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:12px;font-weight:600">
                    <input class="outline-desc" value="" placeholder="描述（可选）" style="width:100%;padding:4px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-secondary);font-size:11px">
                    <div style="margin-top:4px;font-size:11px;color:var(--text-secondary)">模式：单次章节（如需重复，请在模板管理中配置“按列表重复”）</div>
                </div>
                <button onclick="this.closest('.chat-outline-item').remove()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:12px;padding:2px">✕</button>
            `;
            container.appendChild(div);
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            chatMessages.push({ role: 'user', content: msg });
            await renderChat(document.getElementById('content'));
            try {
                const res = await fetchJson(`${API}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, session_id: chatSessionId })
                });
                chatSessionId = res.session_id;
                chatMessages.push({ role: 'assistant', content: res.reply, action: res.action || null });
            } catch (e) {
                chatMessages.push({ role: 'assistant', content: `❌ ${e.message}` });
            }
            await renderChat(document.getElementById('content'));
        }

        async function sendParamValue(messageIndex) {
            const message = chatMessages[messageIndex];
            const action = message?.action;
            if (!action || action.type !== 'ask_param') return;
            const paramId = action.param?.id;
            const widget = action.widget || {};
            const value = readParamWidgetValue(messageIndex, action);
            const isMulti = widget.kind === 'multi_select';
            const hasValue = isMulti ? Array.isArray(value) && value.length > 0 : !!value;
            if (!paramId || !hasValue) {
                alert('请先输入参数值。');
                return;
            }
            const displayValue = Array.isArray(value) ? value.join('、') : value;
            chatMessages.push({ role: 'user', content: displayValue });
            await renderChat(document.getElementById('content'));
            try {
                const payload = {
                    message: displayValue,
                    session_id: chatSessionId,
                    param_id: paramId,
                };
                if (isMulti) {
                    payload.param_values = value;
                } else {
                    payload.param_value = value;
                }
                const res = await fetchJson(`${API}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                chatSessionId = res.session_id;
                chatMessages.push({ role: 'assistant', content: res.reply, action: res.action || null });
            } catch (e) {
                chatMessages.push({ role: 'assistant', content: `❌ ${e.message}` });
            }
            await renderChat(document.getElementById('content'));
        }

        async function sendChatCommand(command, targetParamId = '', label = '') {
            if (label) {
                chatMessages.push({ role: 'user', content: label });
                await renderChat(document.getElementById('content'));
            }
            try {
                const payload = { message: '', session_id: chatSessionId, command };
                if (targetParamId) payload.target_param_id = targetParamId;
                const res = await fetchJson(`${API}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                chatSessionId = res.session_id;
                chatMessages.push({ role: 'assistant', content: res.reply, action: res.action || null });
            } catch (e) {
                chatMessages.push({ role: 'assistant', content: `❌ ${e.message}` });
            }
            await renderChat(document.getElementById('content'));
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeJsSingleQuoted(value) {
            return String(value ?? '')
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'");
        }

        function formatDebugValue(value) {
            if (value === null || value === undefined || value === '') return '无';
            if (typeof value === 'string') return value;
            return JSON.stringify(value, null, 2);
        }

        function renderSectionDebug(debug, openByDefault) {
            const info = debug || {};
            return `
                <details class="debug-panel" ${openByDefault ? 'open' : ''}>
                    <summary>调试信息 · 尝试 ${info.attempts || 0} 次 · 返回 ${info.row_count || 0} 行</summary>
                    <div class="debug-body">
                        <div class="debug-block">
                            <div class="debug-block-title">查询意图</div>
                            <pre>${escapeHtml(formatDebugValue(info.nl_request))}</pre>
                        </div>
                        <div class="debug-block">
                            <div class="debug-block-title">Ibis 代码</div>
                            <pre>${escapeHtml(formatDebugValue(info.ibis_code))}</pre>
                        </div>
                        <div class="debug-block">
                            <div class="debug-block-title">编译 SQL</div>
                            <pre>${escapeHtml(formatDebugValue(info.compiled_sql))}</pre>
                        </div>
                        <div class="debug-block">
                            <div class="debug-block-title">样本结果</div>
                            <pre>${escapeHtml(formatDebugValue(info.sample_rows || []))}</pre>
                        </div>
                        <div class="debug-block">
                            <div class="debug-block-title">错误信息</div>
                            <pre>${escapeHtml(formatDebugValue(info.error_message))}</pre>
                        </div>
                    </div>
                </details>
            `;
        }

                inst = dataOrId;

                <div style="margin-bottom:20px;font-size:12px;color:var(--text-secondary)">
