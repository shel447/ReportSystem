<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能报告系统（需求分析用Demo）</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0b8;
            --border: #2a2a4a;
            --success: #00d2ff;
            --warning: #ffc107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar h1 {
            font-size: 16px;
            font-weight: 700;
            padding: 0 20px 20px;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(233, 69, 96, 0.1);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(233, 69, 96, 0.15);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        .nav-item .icon {
            margin-right: 10px;
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .header .user-badge {
            background: var(--bg-card);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--success);
        }

        .content {
            flex: 1;
            padding: 24px 28px;
            overflow-y: auto;
        }

        /* Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(233, 69, 96, 0.15);
        }

        .card h3 {
            font-size: 15px;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Tables */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 16px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }

        .data-table th {
            background: rgba(255, 255, 255, 0.05);
            padding: 14px 20px;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover td {
            background: rgba(233, 69, 96, 0.05);
        }

        .card .meta {

            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .badge-type {
            background: rgba(0, 210, 255, 0.15);
            color: var(--success);
        }

        .badge-status {
            background: rgba(255, 193, 7, 0.15);
            color: var(--warning);
        }

        .badge-active {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }

        /* Buttons */
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
        }

        .btn-danger {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }

        /* Forms */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            width: 480px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-lg {
            width: 800px !important;
            max-width: 90vw !important;
            max-height: 85vh !important;
        }

        .modal h3 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* Chat */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Chat Mode - Immersive Layout */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 100px;
            /* 为固底输入框留空 */
        }

        .chat-msg {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .chat-msg.user {
            align-self: flex-end;
        }

        .chat-msg.assistant {
            align-self: flex-start;
        }

        .chat-bubble {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            white-space: pre-wrap;
        }

        .chat-msg.user .chat-bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-msg.assistant .chat-bubble {
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .chat-input-row {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 300px);
            max-width: 760px;
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 30px;
            display: flex;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            z-index: 100;
        }

        .chat-input-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 8px 16px;
            outline: none;
            font-size: 14px;
        }


        /* Instance detail */
        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 12px;
        }

        .section-card h4 {
            font-size: 14px;
            margin-bottom: 10px;
            color: var(--success);
        }

        .section-card pre {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .section-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h1>📊 报告系统<div style="font-size:11px;color:var(--text-secondary);margin-top:4px;font-weight:400">（需求分析用Demo）
                v1.2.0</div>
        </h1>
        <div class="nav-item active" onclick="switchTab('chat')"><span class="icon">💬</span>对话助手</div>
        <div class="nav-item" onclick="switchTab('templates')"><span class="icon">📋</span>模板管理</div>
        <div class="nav-item" onclick="switchTab('instances')"><span class="icon">📄</span>报告实例</div>
        <div class="nav-item" onclick="switchTab('documents')"><span class="icon">📑</span>报告文档</div>
        <div class="nav-item" onclick="switchTab('tasks')"><span class="icon">⏰</span>定时任务</div>
    </div>


    <div class="main">
        <div class="header">
            <h2 id="page-title">对话助手</h2>
            <div style="display:flex; gap:12px; align-items:center;">
                <button onclick="viewHelp()"
                    style="padding:6px 14px;font-size:13px;background:var(--bg-input);border:1px solid var(--border);color:var(--text-primary);border-radius:20px;cursor:pointer;transition:all 0.2s">❓
                    帮助</button>
                <span class="user-badge">👤 陆Sir (default)</span>
            </div>
        </div>

        <div class="content" id="content"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-content"></div>
    </div>

    <script>
        const API = '/api';
        let currentTab = 'chat';
        let chatSessionId = '';

        let chatMessages = [];

        // --- Navigation ---
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
            const titles = { templates: '模板管理', instances: '报告实例', documents: '报告文档', tasks: '定时任务', chat: '对话助手' };
            document.getElementById('page-title').textContent = titles[tab];
            loadContent();
        }

        async function loadContent() {
            const c = document.getElementById('content');
            if (currentTab === 'chat') { renderChat(c); return; }
            if (currentTab === 'templates') { await renderTemplates(c); return; }
            if (currentTab === 'instances') { await renderInstances(c); return; }
            if (currentTab === 'documents') { await renderDocuments(c); return; }
            if (currentTab === 'tasks') { await renderTasks(c); return; }
        }

        // --- Templates ---
        async function renderTemplates(c) {
            const data = await fetch(`${API}/templates`).then(r => r.json());
            c.innerHTML = `
        <div class="toolbar">
            <button class="btn btn-primary" onclick="showCreateTemplate()">+ 新建模板</button>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>模板名称</th>
                        <th>场景</th>
                        <th>类型</th>
                        <th>创建时间</th>
                        <th style="text-align:right">操作</th>
                    </tr>
                </thead>
                <tbody>
                    ${data.length === 0 ? '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-secondary)">暂无模板数据</td></tr>' : ''}
                    ${data.map(t => `
                        <tr>
                            <td font-weight:600>${t.name}</td>
                            <td><span class="badge badge-status">${t.scenario || '通用'}</span></td>
                            <td><span class="badge badge-type">${t.report_type}</span></td>
                            <td style="color:var(--text-secondary);font-size:12px">${t.created_at}</td>
                            <td style="text-align:right">
                                <button class="btn btn-primary btn-sm" onclick="viewTemplate('${t.template_id}')">详情</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteTemplate('${t.template_id}')">删除</button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>`;
        }

        function showCreateTemplate() {
            showModal(`
                <h3>新建报告模板</h3>
                <div class="form-group">
                    <label>模板名称</label>
                    <input id="tmpl-name" placeholder="如：周度运营分析报告">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <input id="tmpl-desc" placeholder="简要说明模板用途">
                </div>
                <div class="form-group">
                    <label>场景</label>
                    <input id="tmpl-scenario" placeholder="如：设备监控 / 业务分析">
                </div>
                <div class="form-group">
                    <label>报告类型</label>
                    <select id="tmpl-type">
                        <option value="daily">日报 (Daily)</option>
                        <option value="weekly">周报 (Weekly)</option>
                        <option value="special">专项报告 (Special)</option>
                    </select>
                </div>

                <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                        <label style="margin:0;font-weight:600;font-size:14px">📋 报告大纲</label>
                        <button class="btn btn-secondary btn-sm" onclick="addOutlineSection('tmpl-outline')" style="padding:4px 10px;font-size:11px">+ 添加章节</button>
                    </div>
                    <div id="tmpl-outline">
                        <div class="outline-item" data-level="1" style="display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;padding:10px;background:var(--bg-secondary);border-radius:8px;border-left:3px solid var(--accent);margin-left:0px;transition:margin-left 0.2s">
                            <div style="display:flex;flex-direction:column;gap:4px;padding-top:4px">
                                <button onclick="changeOutlineLevel(this,-1)" title="向左缩进" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:2px">◂</button>
                                <button onclick="changeOutlineLevel(this,1)" title="向右缩进" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:2px">▸</button>
                            </div>
                            <div style="flex:1">
                                <input class="outline-title" value="执行摘要" placeholder="章节标题" style="width:100%;margin-bottom:4px;padding:6px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-size:13px;font-weight:600">
                                <input class="outline-desc" value="总体概述与结论" placeholder="章节描述（可选）" style="width:100%;padding:6px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);font-size:12px">
                            </div>
                            <div style="display:flex;flex-direction:column;gap:2px">
                                <button onclick="moveOutlineItem(this,-1)" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:11px;padding:2px">▲</button>
                                <button onclick="removeOutlineItem(this)" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:2px">✕</button>
                                <button onclick="moveOutlineItem(this,1)" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:11px;padding:2px">▼</button>
                            </div>
                        </div>
                    </div>
                    <div style="font-size:11px;color:var(--text-secondary);margin-top:4px">💡 支持多级嵌套。通过 ◂ 和 ▸ 调整大纲层级结构</div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-secondary" onclick="hideModal()">取消</button>
                    <button class="btn btn-primary" onclick="createTemplate()">创建</button>
                </div>
            `);
        }

        function changeOutlineLevel(btn, delta) {
            const item = btn.closest('.outline-item');
            let level = parseInt(item.dataset.level || 1);
            level += delta;
            if (level < 1) level = 1;
            if (level > 4) level = 4; // max level
            item.dataset.level = level;
            item.style.marginLeft = ((level - 1) * 24) + 'px';
        }

        function addOutlineSection(containerId) {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = 'outline-item';
            div.dataset.level = 1;
            div.style.cssText = 'display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;padding:10px;background:var(--bg-secondary);border-radius:8px;border-left:3px solid var(--accent);margin-left:0px;transition:margin-left 0.2s';
            div.innerHTML = `
                <div style="display:flex;flex-direction:column;gap:4px;padding-top:4px">
                    <button onclick="changeOutlineLevel(this,-1)" title="向左缩进" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:2px">◂</button>
                    <button onclick="changeOutlineLevel(this,1)" title="向右缩进" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:2px">▸</button>
                </div>
                <div style="flex:1">
                    <input class="outline-title" value="" placeholder="章节标题" style="width:100%;margin-bottom:4px;padding:6px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-size:13px;font-weight:600">
                    <input class="outline-desc" value="" placeholder="章节描述（可选）" style="width:100%;padding:6px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);font-size:12px">
                </div>
                <div style="display:flex;flex-direction:column;gap:2px">
                    <button onclick="moveOutlineItem(this,-1)" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:11px;padding:2px">▲</button>
                    <button onclick="removeOutlineItem(this)" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:2px">✕</button>
                    <button onclick="moveOutlineItem(this,1)" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:11px;padding:2px">▼</button>
                </div>`;
            container.appendChild(div);
        }

        function removeOutlineItem(btn) {
            const item = btn.closest('.outline-item');
            if (item.parentElement.querySelectorAll('.outline-item').length <= 1) {
                alert('至少保留一个章节');
                return;
            }
            item.remove();
        }

        function moveOutlineItem(btn, dir) {
            const item = btn.closest('.outline-item');
            const container = item.parentElement;
            if (dir === -1 && item.previousElementSibling) {
                container.insertBefore(item, item.previousElementSibling);
            } else if (dir === 1 && item.nextElementSibling) {
                container.insertBefore(item.nextElementSibling, item);
            }
        }

        function collectOutline(containerId) {
            const items = document.querySelectorAll(`#${containerId} .outline-item`);
            return Array.from(items).map(item => ({
                title: item.querySelector('.outline-title').value.trim(),
                description: item.querySelector('.outline-desc')?.value.trim() || '',
                level: parseInt(item.dataset.level || 1)
            })).filter(o => o.title);
        }

        async function createTemplate() {
            const outline = collectOutline('tmpl-outline');
            if (outline.length === 0) { alert('请至少添加一个大纲章节'); return; }

            const data = {
                name: document.getElementById('tmpl-name').value,
                description: document.getElementById('tmpl-desc').value,
                scenario: document.getElementById('tmpl-scenario').value,
                report_type: document.getElementById('tmpl-type').value,
                content_params: [
                    { name: "date", label: "日期", type: "date", required: true, default: "" },
                    { name: "devices", label: "涉及设备", type: "text", required: true, default: "", placeholder: "如：Router-001, Switch-001" }
                ],
                outline: outline
            };

            const res = await fetch(`${API}/templates`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                hideModal();
                loadContent();
            } else {
                const err = await res.json();
                alert('创建失败: ' + (err.detail || '未知错误'));
            }
        }


        async function viewTemplate(id) {
            const t = await fetch(`${API}/templates/${id}`).then(r => r.json());
            const outlineHtml = (t.outline || []).length > 0

        async function showCreateTask() {

            const templates = await fetch(`${API}/templates`).then(r => r.json());

                    const shortId = inst.instance_id.slice(0, 8);
                    const statusLabel = inst.status === 'finalized' ? '已定稿' : '草稿';
                    return `<option value="${inst.instance_id}" data-tpl-id="${inst.template_id}" data-tpl-name="${tplName}">${tplName} (${shortId}... | ${statusLabel})</option>`;

        <div id="ft-tpl-info" style="display:none;padding:10px 14px;background:var(--bg-secondary);border-radius:8px;margin-bottom:12px;font-size:12px;border-left:3px solid var(--accent)">
            <span style="color:var(--text-secondary)">来自模板：</span>
            <strong id="ft-tpl-name" style="color:var(--success)"></strong>
            <input type="hidden" id="ft-tpl-id">
        </div>
        <div class="form-group"><label>执行模式</label>
            <select id="ft-type" style="width:100%;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px"><option value="recurring">周期性</option><option value="once">一次性</option></select>

        function onTaskInstanceChange() {
            const sel = document.getElementById('ft-instance');
            const infoDiv = document.getElementById('ft-tpl-info');
            const opt = sel.options[sel.selectedIndex];
            if (sel.value && opt.dataset.tplName) {
                document.getElementById('ft-tpl-name').textContent = opt.dataset.tplName;
                document.getElementById('ft-tpl-id').value = opt.dataset.tplId;
                infoDiv.style.display = 'block';
            } else {
                infoDiv.style.display = 'none';
            }
        }

        async function createTask() {
            const instanceId = document.getElementById('ft-instance').value;
            const templateId = document.getElementById('ft-tpl-id').value;
            if (!instanceId) { alert('请先选择一个报告实例'); return; }

            const res = await fetch(`${API}/scheduled-tasks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('ft-name').value,
                    description: document.getElementById('ft-desc').value,
                    source_instance_id: instanceId,
                    template_id: templateId,
                    schedule_type: document.getElementById('ft-type').value,
                    cron_expression: document.getElementById('ft-cron').value,
                    user_id: 'default'
                })
            });
            if (!res.ok) { const e = await res.json(); alert(e.detail); return; }
            hideModal(); loadContent();
        }


        async function runTaskNow(id) {
            const res = await fetch(`${API}/scheduled-tasks/${id}/run-now`, { method: 'POST' }).then(r => r.json());
            alert(`任务已执行！新实例: ${res.instance_id}`);
            loadContent();
        }
        async function pauseTask(id) { await fetch(`${API}/scheduled-tasks/${id}/pause`, { method: 'POST' }); loadContent(); }
        async function resumeTask(id) { await fetch(`${API}/scheduled-tasks/${id}/resume`, { method: 'POST' }); loadContent(); }
        async function deleteTask(id) { await fetch(`${API}/scheduled-tasks/${id}`, { method: 'DELETE' }); loadContent(); }

        // --- Chat ---
        function renderChat(c) {
            c.innerHTML = `
        <div class="chat-container">
            <div id="chat-messages">
                ${chatMessages.length === 0 ? '<div class="empty-state" style="margin-top:100px"><div class="icon">💬</div><p>您好！我是您的智能报告助手。<br>您可以输入“帮我写个巡检报告”来开始。</p></div>' : ''}
                ${chatMessages.map((m, idx) => {
                const isUser = m.role === 'user';
                if (isUser) {
                    return `<div class="chat-msg user"><div class="chat-bubble">${m.content}</div></div>`;
                }
                // assistant message
                let html = `<div class="chat-msg assistant"><div class="chat-bubble">`;
                html += m.content;
                // 如果带有 action，渲染内嵌表单
                if (m.action && m.action.type === 'show_param_form') {
                    const a = m.action;
                    const formId = 'chat-form-' + idx;
                    const disabledStr = a.submitted ? 'disabled' : '';
                    html += `<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">`;
                    html += `<div style="font-weight:600;margin-bottom:12px;color:var(--success)">📋 ${a.template_name} - 参数配置</div>`;
                    const params = (a.content_params && a.content_params.length > 0) ? a.content_params : a.default_params;
                    params.forEach(p => {
                        const inputType = p.type === 'date' ? 'date' : 'text';
                        const defaultVal = p.default || '';
                        const placeholder = p.placeholder || '';
                        const required = p.required ? ' *' : '';
                        html += `<div class="form-group">`;
                        html += `<label>${p.label || p.name}${required}</label>`;
                        html += `<input type="${inputType}" ${disabledStr} data-param-name="${p.name}" class="${formId}-input" value="${defaultVal}" placeholder="${placeholder}" style="background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text-primary);width:100%;font-size:13px">`;
                        html += `</div>`;
                    });

                    html += `<div style="margin-top:16px"><div style="font-weight:600;font-size:13px;margin-bottom:8px">📋 报告大纲预览 & 自定义</div>`;
                    html += `<div id="${formId}-outline-container">`;
                    (a.outline || []).forEach((s, s_idx) => {
                        html += `
                        <div class="chat-outline-item" style="display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;padding:8px;background:var(--bg-secondary);border-radius:6px;border-left:3px solid var(--accent)">
                            <div style="flex:1">
                                <input class="outline-title" ${disabledStr} value="${s.title}" placeholder="章节标题" style="width:100%;margin-bottom:4px;padding:4px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:12px;font-weight:600">
                                <input class="outline-desc" ${disabledStr} value="${s.description || ''}" placeholder="描述（可选）" style="width:100%;padding:4px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-secondary);font-size:11px">
                            </div>
                            ${!a.submitted ? `<button onclick="this.closest('.chat-outline-item').remove()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:12px;padding:2px">✕</button>` : ''}
                        </div>`;
                    });
                    html += `</div>`;

                    if (!a.submitted) {
                        html += `<button class="btn btn-secondary btn-sm" onclick="addChatOutlineSection('${formId}-outline-container')" style="padding:4px 8px;font-size:11px">+ 添加章节</button>`;
                    }
                    html += `</div>`;

                    if (!a.submitted) {
                        html += `<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">`;
                        html += `<button class="btn btn-primary" onclick="submitChatForm('${a.template_id}','${formId}')">🚀 生成报告</button>`;
                        html += `</div></div>`;
                    } else {
                        html += `<div style="margin-top:12px;color:var(--text-secondary);font-size:12px;text-align:right">✅ 已提交生成</div></div>`;
                    }
                }
                html += `</div></div>`;
                return html;
            }).join('')}
            </div>
            <div class="chat-input-row">
                <input id="chat-input" placeholder="输入消息... 如：帮我生成设备巡检报告" onkeypress="if(event.key==='Enter')sendChat()">
                <button class="btn btn-primary" style="border-radius:20px;padding:6px 16px" onclick="sendChat()">发送</button>
            </div>
        </div>`;
            const el = document.getElementById('chat-messages');
            el.scrollTop = el.scrollHeight;
        }

        function addChatOutlineSection(containerId) {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = 'chat-outline-item';
            div.style.cssText = 'display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;padding:8px;background:var(--bg-secondary);border-radius:6px;border-left:3px solid var(--accent)';
            div.innerHTML = `
                <div style="flex:1">
                    <input class="outline-title" value="" placeholder="章节标题" style="width:100%;margin-bottom:4px;padding:4px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:12px;font-weight:600">
                    <input class="outline-desc" value="" placeholder="描述（可选）" style="width:100%;padding:4px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-secondary);font-size:11px">
                </div>
                <button onclick="this.closest('.chat-outline-item').remove()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:12px;padding:2px">✕</button>

            container.appendChild(div);
        }


        async function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';

            chatMessages.push({ role: 'user', content: msg });
            renderChat(document.getElementById('content'));

            const res = await fetch(`${API}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg, session_id: chatSessionId })
            }).then(r => r.json());

            chatSessionId = res.session_id;
            chatMessages.push({ role: 'assistant', content: res.reply, action: res.action || null });
            renderChat(document.getElementById('content'));
        }

                <div style="margin-bottom:20px;font-size:12px;color:var(--text-secondary)">

                    <div style="flex:1"></div>
                    <button class="btn btn-danger btn-sm" onclick="deleteInst('${inst.instance_id}')" style="margin-right:8px">删除</button>
                    ${inst.status !== 'finalized' ? `<button class="btn btn-primary" onclick="finalizeInst('${inst.instance_id}')">✅ 定稿并归档</button>` : `<button class="btn btn-primary" onclick="alert('TODO: 导出文档')">📄 导出 PDF</button>`}

        async function finalizeInst(id) {
            if (!confirm('确定要定稿吗？定稿后内容将不可更改。')) return;
            const res = await fetch(`${API}/instances/${id}/finalize`, { method: 'POST' });
            if (res.ok) {
                hideModal();
                loadContent();
            }

        async function finalizeInst(id) {
            try {
                const res = await fetch(`${API}/instances/${id}/finalize`, { method: 'POST' });
                if (res.ok) {
                    hideModal();
                    // 切换到报告实例列表页面
                    currentTab = 'instances';
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    document.querySelectorAll('.nav-item')[2].classList.add('active');
                    document.getElementById('page-title').textContent = '报告实例';
                    await loadContent();
                    alert('✅ 定稿成功！报告已归档。');
                } else {
                    const err = await res.json();
                    alert('定稿失败: ' + (err.detail || '未知错误'));
                }
            } catch (e) {
                alert('定稿请求出错: ' + e.message);
            }
        }

        async function deleteInst(id) {
            await fetch(`${API}/instances/${id}`, { method: 'DELETE' });
            hideModal();
            loadContent();
        }


        async function regenerateSection(instId, index) {
            const res = await fetch(`${API}/instances/${instId}/regenerate/${index}`, { method: 'POST' }).then(r => r.json());
            viewInstanceDetail(res); // 刷新详情
        }

        async function submitChatForm(templateId, formId) {
            const inputs = document.querySelectorAll('.' + formId + '-input');
            const params = {};
            inputs.forEach(inp => {
                params[inp.dataset.paramName] = inp.value;
            });

            const outlineContainer = document.getElementById(formId + '-outline-container');
            let outline_override = [];
            if (outlineContainer) {
                const outlineItems = outlineContainer.querySelectorAll('.chat-outline-item');
                outline_override = Array.from(outlineItems).map(item => ({
                    title: item.querySelector('.outline-title').value.trim(),
                    description: item.querySelector('.outline-desc')?.value.trim() || '',
                    level: parseInt(item.dataset.level || 1)
                })).filter(o => o.title);
            }

            // 更新 chatMessages 以保存用户修改并冻结表单
            const msgIdx = parseInt(formId.split('-')[2]);
            if (chatMessages[msgIdx] && chatMessages[msgIdx].action) {
                const act = chatMessages[msgIdx].action;
                const pList = (act.content_params && act.content_params.length > 0) ? act.content_params : act.default_params;
                pList.forEach(p => {
                    if (params[p.name] !== undefined) p.default = params[p.name];
                });
                act.outline = outline_override;
                act.submitted = true;
            }

            // 添加生成中提示
            chatMessages.push({ role: 'assistant', content: '⏳ 正在为您生成报告，请稍候...' });
            renderChat(document.getElementById('content'));

            try {
                const res = await fetch(`${API}/instances`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        template_id: templateId,
                        input_params: params,
                        outline_override: outline_override.length > 0 ? outline_override : undefined
                    })
                }).then(r => r.json());

                // 替换最后的提示消息
                chatMessages[chatMessages.length - 1] = {
                    role: 'assistant',
                    content: `✅ 报告已生成！共 ${(res.outline_content || []).length} 个章节。正在跳转到报告详情...`
                };
                renderChat(document.getElementById('content'));

                // 短暂延迟后跳转到实例详情
                setTimeout(() => { viewInstanceDetail(res); }, 800);
            } catch (e) {
                chatMessages[chatMessages.length - 1] = {
                    role: 'assistant',
                    content: '❌ 生成失败，请检查参数后重试。'
                };
                renderChat(document.getElementById('content'));
            }
        }

        // --- Help & Docs ---
        async function viewHelp() {
            try {
                const res = await fetch(`${API}/design`);
                if (!res.ok) throw new Error("Failed to fetch");
                const docs = await res.json();

                let html = `
                <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center">
                    <h3 style="font-size:18px">📖 系统设计文档与帮助</h3>
                    <button onclick="hideModal()" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:20px">&times;</button>
                </div>
                <div style="color:var(--text-secondary);margin-bottom:16px;font-size:13px">点击下方条目可在线预览相关文档</div>
                <div style="display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto">
                `;
                docs.forEach(d => {
                    html += `<div onclick="viewDesignDoc('${d.name}')" style="padding:12px 16px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all 0.2s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
                        <span style="font-weight:500">${d.title}</span><span style="color:var(--text-secondary);font-size:12px">📄 ${d.name}</span>
                    </div>`;
                });
                html += `</div>`;
                showModal(html);
            } catch (err) {
                console.error(err);
                alert("无法获取设计文档清单");
            }
        }

        async function viewDesignDoc(filename) {
            try {
                const res = await fetch(`${API}/design/${filename}`);
                if (!res.ok) throw new Error("Failed to fetch");
                const doc = await res.json();

                // Configure marked to handle mermaid code blocks
                const renderer = new marked.Renderer();
                const defaultCode = renderer.code.bind(renderer);
                renderer.code = function (code, language, isEscaped) {
                    if (language === 'mermaid') {
                        return `<div class="mermaid">${code}</div>`;
                    }
                    return defaultCode(code, language, isEscaped);
                };
                marked.setOptions({ renderer: renderer });

                const contentHtml = marked.parse(doc.content);
                let html = `
                <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center">
                    <div style="display:flex;align-items:center;gap:12px">
                        <button onclick="viewHelp()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:20px" title="返回列表">←</button>
                        <h3 style="font-size:18px">${doc.name}</h3>
                    </div>
                </div>
                <div class="md-preview" style="background:var(--bg-secondary);padding:24px;border-radius:8px;max-height:70vh;overflow-y:auto;line-height:1.6;font-size:14px;color:var(--text-primary)">
                    ${contentHtml}
                </div>
                <style>
                    .md-preview h1, .md-preview h2, .md-preview h3 { margin-top:1.5em;margin-bottom:0.5em;color:var(--accent); }
                    .md-preview pre { background:var(--bg-card);padding:12px;border-radius:6px;overflow-x:auto;margin:1em 0; border:1px solid var(--border); }
                    .md-preview code { font-family:monospace;background:rgba(255,255,255,0.1);padding:2px 4px;border-radius:4px; }
                    .md-preview ul, .md-preview ol { padding-left:2em;margin-bottom:1em; }
                    .md-preview a { color:var(--success);text-decoration:none; }
                    .md-preview blockquote { border-left:4px solid var(--border);padding-left:1em;color:var(--text-secondary);margin:1em 0; }
                    .md-preview table { width:100%;border-collapse:collapse;margin:1em 0; }
                    .md-preview th, .md-preview td { border:1px solid var(--border);padding:8px 12px;text-align:left; }
                    .md-preview th { background:var(--bg-card); }
                </style>
                `;
                showModal(html, true); // true for large modal

                // Initialize Mermaid graph formatting for current injected data
                if (window.mermaid) {
                    mermaid.init(undefined, document.querySelectorAll('.mermaid'));
                }
            } catch (err) {
                console.error(err);
                alert("无法加载文档内容");
            }
        }

        // --- Modal ---
        function showModal(html, isLarge = false) {
            const modalContent = document.getElementById('modal-content');
            if (isLarge) {
                modalContent.classList.add('modal-lg');
            } else {
                modalContent.classList.remove('modal-lg');
            }
            modalContent.innerHTML = html;
            document.getElementById('modal-overlay').classList.add('show');
        }
        function hideModal() {
            document.getElementById('modal-overlay').classList.remove('show');
            document.getElementById('modal-content').classList.remove('modal-lg'); // Ensure modal-lg is removed on hide
        }
        document.getElementById('modal-overlay').addEventListener('click', function (e) {
            if (e.target === this) hideModal();
        });

        // Init
        loadContent();
    </script>
</body>

</html>
