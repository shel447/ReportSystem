name: Sync to shel447/ReportSystem

on:
  push:
    branches: ['**']
    tags: ['**']

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && github.actor != 'sync-bot'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "sync-bot"
          git config user.email "sync-bot@noreply.github.com"

      - name: Fetch all branches
        run: |
          git fetch --all --prune

      - name: Force push to shel447/ReportSystem (jishu-Data is primary)
        run: |
          git remote add target https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/shel447/ReportSystem.git 2>/dev/null || true
          git push target --all --force
          git push target --tags --force
