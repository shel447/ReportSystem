name: test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sync backend dependencies
        working-directory: modules/backend
        run: uv sync --dev
      - name: Run backend tests
        working-directory: modules/backend
        env:
          REPORT_SYSTEM_DATA_DIR: .test/ci/backend-fast
        run: uv run pytest tests -m "not exporter_e2e" -q

  exporter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run exporter tests
        working-directory: modules/exporter
        run: mvn test -q
      - name: Package exporter
        working-directory: modules/exporter
        run: mvn package -q -DskipTests

  exporter-e2e:
    runs-on: ubuntu-latest
    needs: [backend-fast, exporter]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Sync backend dependencies
        working-directory: modules/backend
        run: uv sync --dev
      - name: Run real Office exporter API tests
        working-directory: modules/backend
        env:
          REPORT_SYSTEM_DATA_DIR: .test/ci/exporter-e2e
        run: uv run pytest tests -m exporter_e2e -q
