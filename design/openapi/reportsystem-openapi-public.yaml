openapi: 3.1.0
info:
  title: ReportSystem ChatBI Public API
  version: 2026-04-17
  description: |
    目标态业务公开接口定义。接口外层协议严格对齐 ChatBI，
    报告系统仅在 REPORT 结果体和 reports 资源族上做兼容式扩展。
servers:
  - url: /rest/chatbi/v1
security:
  - XUserIdHeader: []
tags:
  - name: templates
  - name: chat
  - name: reports
  - name: parameter-options
paths:
  /templates:
    get:
      tags: [templates]
      summary: List templates
      operationId: listTemplates
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReportTemplate"
                  total:
                    type: integer
                required: [items, total]
    post:
      tags: [templates]
      summary: Create template
      operationId: createTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportTemplate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportTemplate"

  /templates/{id}:
    get:
      tags: [templates]
      summary: Get template
      operationId: getTemplate
      parameters:
        - $ref: "#/components/parameters/TemplateId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportTemplate"
    put:
      tags: [templates]
      summary: Update template
      operationId: updateTemplate
      parameters:
        - $ref: "#/components/parameters/TemplateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportTemplate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportTemplate"
    delete:
      tags: [templates]
      summary: Delete template
      operationId: deleteTemplate
      parameters:
        - $ref: "#/components/parameters/TemplateId"
      responses:
        "204":
          description: Deleted

  /templates/import/preview:
    post:
      tags: [templates]
      summary: Preview template import
      operationId: previewTemplateImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  oneOf:
                    - type: string
                    - type: object
              required: [content]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  normalizedTemplate:
                    $ref: "#/components/schemas/ReportTemplate"
                  warnings:
                    type: array
                    items:
                      type: string
                required: [normalizedTemplate, warnings]

  /templates/{id}/export:
    get:
      tags: [templates]
      summary: Export template
      operationId: exportTemplate
      parameters:
        - $ref: "#/components/parameters/TemplateId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportTemplate"

  /chat:
    get:
      tags: [chat]
      summary: List conversations
      operationId: listConversations
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConversationSummary"
                  total:
                    type: integer
                required: [items, total]
    post:
      tags: [chat]
      summary: Send chat turn
      operationId: sendChatTurn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Non-streaming ChatBI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "206":
          description: Streaming ChatBI response
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ChatStreamEvent"

  /chat/forks:
    post:
      tags: [chat]
      summary: Fork conversation or reopen from template instance
      operationId: forkConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForkRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"

  /chat/{conversationId}:
    get:
      tags: [chat]
      summary: Get conversation
      operationId: getConversation
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"
    delete:
      tags: [chat]
      summary: Delete conversation
      operationId: deleteConversation
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "204":
          description: Deleted

  /reports/{reportId}:
    get:
      tags: [reports]
      summary: Get report view
      operationId: getReport
      parameters:
        - $ref: "#/components/parameters/ReportId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportViewResponse"

  /reports/{reportId}/document-generations:
    post:
      tags: [reports]
      summary: Generate report documents
      operationId: generateReportDocuments
      parameters:
        - $ref: "#/components/parameters/ReportId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentGenerationRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentGenerationResponse"

  /reports/{reportId}/documents/{documentId}/download:
    get:
      tags: [reports]
      summary: Download report document
      operationId: downloadReportDocument
      parameters:
        - $ref: "#/components/parameters/ReportId"
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: File stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /parameter-options/resolve:
    post:
      tags: [parameter-options]
      summary: Resolve dynamic parameter options
      operationId: resolveParameterOptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParameterOptionsResolveRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParameterOptionsResolveResponse"

components:
  securitySchemes:
    XUserIdHeader:
      type: apiKey
      in: header
      name: X-User-Id
  parameters:
    TemplateId:
      name: id
      in: path
      required: true
      schema:
        type: string
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
  schemas:
    ReportTemplate:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
        name:
          type: string
        description:
          type: string
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/TemplateParameter"
        catalogs:
          type: array
          items:
            $ref: "#/components/schemas/TemplateCatalog"
      required: [id, category, name, description, parameters, catalogs]
    TemplateParameter:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        interaction_mode:
          type: string
          enum: [form, chat]
        required:
          type: boolean
      required: [id, name, type, interaction_mode, required]
    TemplateCatalog:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/TemplateSection"
      required: [id, name, sections]
    TemplateSection:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        outline:
          type: object
        content:
          type: object
      required: [id, title]
    ConversationSummary:
      type: object
      properties:
        conversationId:
          type: string
        title:
          type: string
        updatedAt:
          type: string
          format: date-time
      required: [conversationId, title, updatedAt]
    ConversationDetail:
      type: object
      properties:
        conversationId:
          type: string
        title:
          type: string
        chats:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required: [conversationId, title, chats]
    ChatMessage:
      type: object
      properties:
        chatId:
          type: string
        role:
          type: string
        content:
          type: string
        action:
          type: object
        meta:
          type: object
      required: [chatId, role, content]
    ChatRequest:
      type: object
      properties:
        conversationId:
          type: string
        chatId:
          type: string
        instruction:
          type: string
        question:
          type: string
        reply:
          type: object
        command:
          type: object
        histories:
          type: array
          items:
            type: object
      required: [question]
    ChatResponse:
      type: object
      properties:
        conversationId:
          type: string
        chatId:
          type: string
        answerType:
          type: string
        answer:
          oneOf:
            - $ref: "#/components/schemas/ReportAnswerEnvelope"
            - type: object
      required: [conversationId, chatId, answerType, answer]
    ChatStreamEvent:
      type: object
      properties:
        eventType:
          type: string
          enum: [status, step_delta, ask, answer, error, done]
        data:
          type: object
      required: [eventType, data]
    ForkRequest:
      type: object
      properties:
        sourceKind:
          type: string
          enum: [chat, template_instance]
        sourceConversationId:
          type: string
        sourceChatId:
          type: string
        templateInstanceId:
          type: string
      required: [sourceKind]
    ReportViewResponse:
      type: object
      properties:
        reportId:
          type: string
        status:
          type: string
        answerType:
          type: string
          const: REPORT
        answer:
          $ref: "#/components/schemas/ReportAnswerEnvelope"
      required: [reportId, status, answerType, answer]
    ReportAnswerEnvelope:
      type: object
      properties:
        reportId:
          type: string
        status:
          type: string
        report:
          $ref: "#/components/schemas/ReportDsl"
        templateInstance:
          $ref: "#/components/schemas/TemplateInstance"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/ReportDocument"
        generationProgress:
          type: object
      required: [reportId, status, report, templateInstance, documents]
    TemplateInstance:
      type: object
      properties:
        id:
          type: string
        conversationId:
          type: string
        templateId:
          type: string
        catalogs:
          type: array
          items:
            $ref: "#/components/schemas/TemplateCatalogInstance"
        bindingStatus:
          type: object
      required: [id, conversationId, templateId, catalogs]
    TemplateCatalogInstance:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/TemplateSectionInstance"
      required: [id, name, sections]
    TemplateSectionInstance:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        requirementInstance:
          type: object
        skeletonStatus:
          type: string
      required: [id, title]
    ReportDsl:
      type: object
      properties:
        basicInfo:
          type: object
        cover:
          type: object
        signaturePage:
          type: object
        catalogs:
          type: array
          items:
            $ref: "#/components/schemas/ReportCatalog"
        summary:
          type: object
        reportMeta:
          type: object
        layout:
          type: object
      required: [basicInfo, catalogs, summary, reportMeta, layout]
    ReportCatalog:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/ReportSection"
      required: [id, name, sections]
    ReportSection:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        components:
          type: array
          items:
            $ref: "#/components/schemas/ReportComponent"
      required: [id, title, components]
    ReportComponent:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        data:
          type: object
        meta:
          type: object
      required: [id, type]
    ReportDocument:
      type: object
      properties:
        documentId:
          type: string
        format:
          type: string
          enum: [markdown, word, ppt, pdf]
        status:
          type: string
        downloadUrl:
          type: string
      required: [documentId, format, status]
    DocumentGenerationRequest:
      type: object
      properties:
        formats:
          type: array
          items:
            type: string
            enum: [word, ppt, pdf]
        pdfSource:
          type: string
          enum: [word, ppt]
        theme:
          type: string
        strictValidation:
          type: boolean
        regenerateIfExists:
          type: boolean
      required: [formats]
    DocumentGenerationResponse:
      type: object
      properties:
        reportId:
          type: string
        jobs:
          type: array
          items:
            type: object
            properties:
              jobId:
                type: string
              format:
                type: string
              status:
                type: string
              dependsOn:
                type: string
        documents:
          type: array
          items:
            $ref: "#/components/schemas/ReportDocument"
      required: [reportId, jobs, documents]
    ParameterOptionsResolveRequest:
      type: object
      properties:
        source:
          type: string
        method:
          type: string
          enum: [POST]
        request:
          type: object
        limit:
          type: integer
          minimum: 1
          maximum: 50
      required: [source, method, request]
    ParameterOptionsResolveResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              value:
                type: string
              query:
                type: string
            required: [label, value, query]
        meta:
          type: object
      required: [items, meta]
