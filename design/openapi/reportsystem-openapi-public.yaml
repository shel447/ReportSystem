openapi: 3.1.0
info:
  title: ReportSystem Public API
  version: '2026-04-18'
  description: |
    报告主系统公开接口。模板、模板实例和报告 DSL 的正式模型定义
    统一收敛到 design/report_system/schemas 下的 JSON Schema 文件。
servers:
  - url: /rest/chatbi/v1
security:
  - XUserIdHeader: []
tags:
  - name: templates
  - name: chat
  - name: reports
  - name: parameter-options
paths:
  /templates:
    get:
      tags: [templates]
      summary: List template summaries
      operationId: listTemplates
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/TemplateSummary'
                  total:
                    type: integer
                required: [items, total]
    post:
      tags: [templates]
      summary: Create template
      operationId: createTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportTemplate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplate'

  /templates/{id}:
    get:
      tags: [templates]
      summary: Get template detail
      operationId: getTemplate
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplate'
    put:
      tags: [templates]
      summary: Update template
      operationId: updateTemplate
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportTemplate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplate'
    delete:
      tags: [templates]
      summary: Delete template
      operationId: deleteTemplate
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '204':
          description: Deleted

  /templates/import/preview:
    post:
      tags: [templates]
      summary: Preview template import
      operationId: previewTemplateImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  oneOf:
                    - type: string
                    - type: object
              required: [content]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  normalizedTemplate:
                    $ref: '#/components/schemas/ReportTemplate'
                  warnings:
                    type: array
                    items:
                      type: string
                required: [normalizedTemplate, warnings]

  /templates/{id}/export:
    get:
      tags: [templates]
      summary: Export template
      operationId: exportTemplate
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplate'

  /chat:
    get:
      tags: [chat]
      summary: List conversations
      operationId: listConversations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConversationSummary'
                  total:
                    type: integer
                required: [items, total]
    post:
      tags: [chat]
      summary: Send chat turn
      operationId: sendChatTurn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Chat snapshot response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '206':
          description: Streaming chat events
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ChatStreamEvent'

  /chat/forks:
    post:
      tags: [chat]
      summary: Fork conversation or reopen from template instance
      operationId: forkConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForkRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDetail'

  /chat/{conversationId}:
    get:
      tags: [chat]
      summary: Get conversation detail
      operationId: getConversation
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDetail'
    delete:
      tags: [chat]
      summary: Delete conversation
      operationId: deleteConversation
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '204':
          description: Deleted

  /reports/{reportId}:
    get:
      tags: [reports]
      summary: Get report resource
      operationId: getReport
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportInstanceResource'

  /reports/{reportId}/document-generations:
    post:
      tags: [reports]
      summary: Generate report documents
      operationId: generateReportDocuments
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentGenerationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentGenerationResponse'

  /reports/{reportId}/documents/{documentId}/download:
    get:
      tags: [reports]
      summary: Download generated document
      operationId: downloadDocument
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '302':
          description: Redirect to file storage URL

  /parameter-options/resolve:
    post:
      tags: [parameter-options]
      summary: Resolve dynamic parameter options
      operationId: resolveParameterOptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParameterOptionsResolveRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParameterOptionsResolveResponse'

components:
  securitySchemes:
    XUserIdHeader:
      type: apiKey
      in: header
      name: X-User-Id
  parameters:
    TemplateId:
      name: id
      in: path
      required: true
      schema: { type: string }
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema: { type: string }
    ReportId:
      name: reportId
      in: path
      required: true
      schema: { type: string }
    DocumentId:
      name: documentId
      in: path
      required: true
      schema: { type: string }
  schemas:
    ReportTemplate:
      $ref: ../report_system/schemas/report-template.schema.json
    TemplateInstance:
      $ref: ../report_system/schemas/template-instance.schema.json
    ReportDsl:
      $ref: ../report_system/schemas/report-dsl.schema.json
    TrioValue:
      $ref: ../report_system/schemas/report-template.schema.json#/$defs/TrioValue
    TemplateSummary:
      type: object
      properties:
        id: { type: string }
        category: { type: string }
        name: { type: string }
        description: { type: string }
        schemaVersion: { type: string }
        updatedAt: { type: string, format: date-time }
      required: [id, category, name, description, schemaVersion]
    ConversationSummary:
      type: object
      properties:
        conversationId: { type: string }
        title: { type: string }
        status: { type: string }
        updatedAt: { type: string, format: date-time }
      required: [conversationId, title, status, updatedAt]
    ConversationDetail:
      type: object
      properties:
        conversationId: { type: string }
        title: { type: string }
        status: { type: string }
        chats:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
      required: [conversationId, title, status, chats]
    ChatMessage:
      type: object
      properties:
        chatId: { type: string }
        conversationId: { type: string }
        role: { type: string, enum: [user, assistant, system] }
        content: { type: string }
        createdAt: { type: string, format: date-time }
      required: [chatId, conversationId, role, content]
    ChatRequest:
      type: object
      properties:
        conversationId: { type: string }
        chatId: { type: string }
        question: { type: string, nullable: true }
        instruction: { type: string, enum: [generate_report, extract_report_template] }
        reply:
          anyOf:
            - { type: 'null' }
            - { $ref: '#/components/schemas/Reply' }
        attachments:
          type: array
          items:
            type: object
            properties:
              type: { type: string }
              name: { type: string }
              content: { type: string }
            required: [type, name, content]
        histories:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        requestId: { type: string }
        apiVersion: { type: string }
      required: [conversationId, chatId, instruction, attachments, histories, requestId, apiVersion]
    Reply:
      type: object
      properties:
        type: { type: string, enum: [fill_params, confirm_params] }
        parameters:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/TrioValue'
        reportContext:
          type: object
          properties:
            templateInstance:
              $ref: '#/components/schemas/TemplateInstance'
      required: [type]
    ChatResponse:
      type: object
      properties:
        conversationId: { type: string }
        chatId: { type: string }
        status: { type: string, enum: [waiting_user, running, finished, failed] }
        steps:
          type: array
          items:
            $ref: '#/components/schemas/Step'
        ask:
          anyOf:
            - { type: 'null' }
            - { $ref: '#/components/schemas/Ask' }
        answer:
          anyOf:
            - { type: 'null' }
            - { $ref: '#/components/schemas/AnswerEnvelope' }
        errors:
          type: array
          items:
            type: object
            properties:
              code: { type: string }
              message: { type: string }
            required: [code, message]
        requestId: { type: string }
        timestamp: { type: integer }
        apiVersion: { type: string }
      required: [conversationId, chatId, status, steps, errors, requestId, timestamp, apiVersion]
    Step:
      type: object
      properties:
        stepId: { type: string }
        parentStepId: { type: string, nullable: true }
        stepType: { type: string, enum: [REASONING, QUERY, PREPARE_ANSWER] }
        title: { type: string }
        status: { type: string, enum: [running, finished, failed] }
        contentType: { type: string, enum: [TEXT, JSON, MARKDOWN] }
        content: {}
        startTime: { type: integer }
        endTime: { type: integer, nullable: true }
        costTime: { type: integer, nullable: true }
      required: [stepId, stepType, title, status, contentType]
    Ask:
      type: object
      properties:
        mode: { type: string, enum: [plaintext, form] }
        type: { type: string, enum: [fill_params, confirm_params] }
        title: { type: string }
        text: { type: string }
        parameters:
          type: array
          items:
            type: object
            properties:
              parameter:
                $ref: '#/components/schemas/TemplateParameterRef'
              currentValue:
                type: array
                items:
                  $ref: '#/components/schemas/TrioValue'
        reportContext:
          type: object
          properties:
            templateInstance:
              $ref: '#/components/schemas/TemplateInstance'
      required: [mode, type, title, text]
    TemplateParameterRef:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        inputType: { type: string }
        required: { type: boolean }
      required: [id, label, inputType, required]
    AnswerEnvelope:
      type: object
      properties:
        answerType: { type: string, enum: [TEXT, REPORT, REPORT_TEMPLATE] }
        answer:
          oneOf:
            - { type: string }
            - { $ref: '#/components/schemas/ReportAnswer' }
            - { $ref: '#/components/schemas/ReportTemplate' }
      required: [answerType, answer]
    ReportAnswer:
      type: object
      properties:
        reportId: { type: string }
        status: { type: string, enum: [generating, available, failed] }
        report:
          $ref: '#/components/schemas/ReportDsl'
        templateInstance:
          $ref: '#/components/schemas/TemplateInstance'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/DocumentArtifact'
        generationProgress:
          type: object
          properties:
            totalSections: { type: integer }
            completedSections: { type: integer }
      required: [reportId, status, report, templateInstance, documents]
    ReportInstanceResource:
      type: object
      properties:
        reportId: { type: string }
        status: { type: string, enum: [generating, available, failed] }
        answerType: { const: REPORT }
        answer:
          $ref: '#/components/schemas/ReportAnswer'
      required: [reportId, status, answerType, answer]
    DocumentArtifact:
      type: object
      properties:
        documentId: { type: string }
        format: { type: string, enum: [word, ppt, pdf, markdown] }
        status: { type: string, enum: [queued, running, ready, failed] }
        downloadUrl: { type: string }
      required: [documentId, format, status]
    DocumentGenerationRequest:
      type: object
      properties:
        formats:
          type: array
          items:
            type: string
            enum: [word, ppt, pdf, markdown]
        pdfSource:
          type: string
          enum: [word, ppt]
        theme:
          type: string
        strictValidation:
          type: boolean
        regenerateIfExists:
          type: boolean
      required: [formats]
    DocumentGenerationResponse:
      type: object
      properties:
        reportId: { type: string }
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/ExportJob'
      required: [reportId, jobs]
    ExportJob:
      type: object
      properties:
        jobId: { type: string }
        format: { type: string, enum: [word, ppt, pdf, markdown] }
        status: { type: string, enum: [queued, running, ready, failed, blocked_by_dependency] }
        dependsOn: { type: string }
      required: [jobId, format, status]
    ParameterOptionsResolveRequest:
      type: object
      properties:
        parameterId: { type: string }
        openSource:
          $ref: ../report_system/schemas/report-template.schema.json#/$defs/OpenSource
        contextValues:
          $ref: ../report_system/schemas/parameter-option-source-request.schema.json
      required: [parameterId, openSource, contextValues]
    ParameterOptionsResolveResponse:
      $ref: ../report_system/schemas/parameter-option-source-response.schema.json
    ChatStreamEvent:
      type: object
      properties:
        conversationId: { type: string }
        chatId: { type: string }
        eventType: { type: string, enum: [status, step_delta, ask, answer, error, done] }
        sequence: { type: integer }
        timestamp: { type: integer }
        status: { type: string }
        step:
          $ref: '#/components/schemas/Step'
        ask:
          $ref: '#/components/schemas/Ask'
        answer:
          $ref: '#/components/schemas/AnswerEnvelope'
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
      required: [conversationId, chatId, eventType, sequence, timestamp]
    ForkRequest:
      type: object
      properties:
        mode: { type: string, enum: [from_conversation, from_template_instance, from_report] }
        sourceConversationId: { type: string }
        sourceTemplateInstanceId: { type: string }
        sourceReportId: { type: string }
      required: [mode]
