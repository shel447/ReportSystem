openapi: 3.1.0
info:
  title: Smart Report System
  version: 1.6.0
paths:
  /rest/chatbi/v1/chat:
    get:
      tags:
      - chat
      summary: List Sessions
      operationId: list_sessions_rest_chatbi_v1_chat_get
      parameters:
      - name: X-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-User-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - chat
      summary: Send Message
      operationId: send_message_rest_chatbi_v1_chat_post
      parameters:
      - name: X-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-User-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessage'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /rest/chatbi/v1/chat/forks:
    post:
      tags:
      - chat
      summary: Fork Session
      operationId: fork_session_rest_chatbi_v1_chat_forks_post
      parameters:
      - name: X-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-User-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatForkRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /rest/chatbi/v1/chat/{session_id}:
    get:
      tags:
      - chat
      summary: Get Session
      operationId: get_session_rest_chatbi_v1_chat__session_id__get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: X-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-User-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - chat
      summary: Delete Session
      operationId: delete_session_rest_chatbi_v1_chat__session_id__delete
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: X-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-User-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /rest/chatbi/v1/parameter-options/resolve:
    post:
      tags:
      - parameter-options
      summary: Resolve Parameter Options
      operationId: resolve_parameter_options_rest_chatbi_v1_parameter_options_resolve_post
      parameters:
      - name: X-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-User-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParameterOptionsResolveRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /rest/chatbi/v1/reports/{report_id}:
    get:
      tags:
      - reports
      summary: Get Report View
      operationId: get_report_view_rest_chatbi_v1_reports__report_id__get
      parameters:
      - name: report_id
        in: path
        required: true
        schema:
          type: string
          title: Report Id
      - name: X-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-User-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /rest/chatbi/v1/reports/{report_id}/documents/{document_id}/download:
    get:
      tags:
      - reports
      summary: Download Report Document
      operationId: download_report_document_rest_chatbi_v1_reports__report_id__documents__document_id__download_get
      parameters:
      - name: report_id
        in: path
        required: true
        schema:
          type: string
          title: Report Id
      - name: document_id
        in: path
        required: true
        schema:
          type: string
          title: Document Id
      - name: X-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-User-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /rest/chatbi/v1/templates:
    get:
      tags:
      - templates
      summary: List Templates
      operationId: list_templates_rest_chatbi_v1_templates_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    post:
      tags:
      - templates
      summary: Create Template
      operationId: create_template_rest_chatbi_v1_templates_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateCreate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /rest/chatbi/v1/templates/import/preview:
    post:
      tags:
      - templates
      summary: Preview Import Template
      operationId: preview_import_template_rest_chatbi_v1_templates_import_preview_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateImportPreviewRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /rest/chatbi/v1/templates/{template_id}:
    get:
      tags:
      - templates
      summary: Get Template
      operationId: get_template_rest_chatbi_v1_templates__template_id__get
      parameters:
      - name: template_id
        in: path
        required: true
        schema:
          type: string
          title: Template Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - templates
      summary: Update Template
      operationId: update_template_rest_chatbi_v1_templates__template_id__put
      parameters:
      - name: template_id
        in: path
        required: true
        schema:
          type: string
          title: Template Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - templates
      summary: Delete Template
      operationId: delete_template_rest_chatbi_v1_templates__template_id__delete
      parameters:
      - name: template_id
        in: path
        required: true
        schema:
          type: string
          title: Template Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /rest/chatbi/v1/templates/{template_id}/export:
    get:
      tags:
      - templates
      summary: Export Template Definition
      operationId: export_template_definition_rest_chatbi_v1_templates__template_id__export_get
      parameters:
      - name: template_id
        in: path
        required: true
        schema:
          type: string
          title: Template Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    ChatCommandPayload:
      properties:
        name:
          type: string
          title: Name
          default: ''
      type: object
      title: ChatCommandPayload
    ChatForkRequest:
      properties:
        source_kind:
          type: string
          title: Source Kind
        source_session_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Session Id
        source_message_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Message Id
      type: object
      required:
      - source_kind
      title: ChatForkRequest
    ChatMessage:
      properties:
        message:
          type: string
          title: Message
          default: ''
        session_id:
          type: string
          title: Session Id
          default: ''
        preferred_capability:
          anyOf:
          - type: string
          - type: 'null'
          title: Preferred Capability
        selected_template_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Selected Template Id
        param_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Param Id
        param_value:
          anyOf:
          - {}
          - type: 'null'
          title: Param Value
        param_values:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Param Values
        command:
          anyOf:
          - type: string
          - $ref: '#/components/schemas/ChatCommandPayload'
          - type: 'null'
          title: Command
        target_param_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Param Id
        outline_override:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          title: Outline Override
        parameter_updates:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Parameter Updates
        conversationId:
          anyOf:
          - type: string
          - type: 'null'
          title: Conversationid
        chatId:
          anyOf:
          - type: string
          - type: 'null'
          title: Chatid
        instruction:
          anyOf:
          - type: string
          - type: 'null'
          title: Instruction
        question:
          anyOf:
          - type: string
          - type: 'null'
          title: Question
        reply:
          anyOf:
          - $ref: '#/components/schemas/ChatReplyPayload'
          - type: 'null'
      type: object
      title: ChatMessage
    ChatReplyPayload:
      properties:
        type:
          type: string
          title: Type
          default: ''
        parameters:
          additionalProperties: true
          type: object
          title: Parameters
          default: {}
      type: object
      title: ChatReplyPayload
    CompletionSettingsUpdate:
      properties:
        base_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Base Url
        model:
          anyOf:
          - type: string
          - type: 'null'
          title: Model
        api_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Api Key
        clear_api_key:
          type: boolean
          title: Clear Api Key
          default: false
        temperature:
          anyOf:
          - type: number
          - type: 'null'
          title: Temperature
        timeout_sec:
          anyOf:
          - type: integer
          - type: 'null'
          title: Timeout Sec
      type: object
      title: CompletionSettingsUpdate
    EmbeddingSettingsUpdate:
      properties:
        base_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Base Url
        model:
          anyOf:
          - type: string
          - type: 'null'
          title: Model
        api_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Api Key
        clear_api_key:
          type: boolean
          title: Clear Api Key
          default: false
        timeout_sec:
          anyOf:
          - type: integer
          - type: 'null'
          title: Timeout Sec
        use_completion_auth:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Use Completion Auth
      type: object
      title: EmbeddingSettingsUpdate
    FeedbackCreate:
      properties:
        submitter:
          type: string
          title: Submitter
        content:
          type: string
          title: Content
        priority:
          type: string
          title: Priority
          default: medium
        images:
          items:
            type: string
          type: array
          title: Images
          default: []
      type: object
      required:
      - submitter
      - content
      title: FeedbackCreate
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ParameterOptionsResolveRequest:
      properties:
        template_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Template Id
        param_id:
          type: string
          title: Param Id
        source:
          type: string
          title: Source
        query:
          anyOf:
          - type: string
          - type: 'null'
          title: Query
        selected_params:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Selected Params
        limit:
          anyOf:
          - type: integer
          - type: 'null'
          title: Limit
      type: object
      required:
      - param_id
      - source
      title: ParameterOptionsResolveRequest
    SettingsTestRequest:
      properties:
        target:
          type: string
          enum:
          - completion
          - embedding
          - both
          title: Target
          default: both
      type: object
      title: SettingsTestRequest
    SettingsUpdateRequest:
      properties:
        completion:
          $ref: '#/components/schemas/CompletionSettingsUpdate'
        embedding:
          $ref: '#/components/schemas/EmbeddingSettingsUpdate'
      type: object
      required:
      - completion
      - embedding
      title: SettingsUpdateRequest
    TemplateCreate:
      properties:
        id:
          type: string
          title: Id
        name:
          type: string
          title: Name
        description:
          type: string
          title: Description
          default: ''
        category:
          type: string
          title: Category
          default: ''
        parameters:
          items: {}
          type: array
          title: Parameters
          default: []
        sections:
          items: {}
          type: array
          title: Sections
          default: []
      type: object
      required:
      - id
      - name
      title: TemplateCreate
    TemplateImportPreviewRequest:
      properties:
        payload:
          additionalProperties: true
          type: object
          title: Payload
        filename:
          anyOf:
          - type: string
          - type: 'null'
          title: Filename
      type: object
      required:
      - payload
      title: TemplateImportPreviewRequest
    TemplateUpdate:
      properties:
        id:
          anyOf:
          - type: string
          - type: 'null'
          title: Id
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        category:
          anyOf:
          - type: string
          - type: 'null'
          title: Category
        parameters:
          anyOf:
          - items: {}
            type: array
          - type: 'null'
          title: Parameters
        sections:
          anyOf:
          - items: {}
            type: array
          - type: 'null'
          title: Sections
      type: object
      title: TemplateUpdate
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
