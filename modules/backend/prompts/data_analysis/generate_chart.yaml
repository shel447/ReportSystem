any:
  description: "NL2Chart的主干prompt模板"
  prompt: |
    功能: 根据用户问题、查询结果和字段描述，快速选择最合适的可视化类型
    **输入数据:**
    1.用户问题: {user_question}
    2.查询结果: {query_results} (数据行列表)
    3.字段说明: {field_descriptions} (列名和数据类型)

    **选择规则**
    |分析意图    |    所需字段                       |   推荐图表   | 适用场合                   |
    |------------|-----------------------------------|--------------|----------------------------|
    |显示单一指标| 1文本 + 1数值                     | Text/Gauge   | 总量、聚合                 |
    |查看原始数据| 多个字段 (且无明确时间趋势意图)   | Table        | 展示原始数据               |
    |分类比较    | 1分类 + 1数值，没有其他维度字段   | Bar          | 列之间的关系               |
    |趋势分析    | 1时间 + 1数值，没有其他维度字段   | Line         | 单个实体/类别的趋势对比    |
    |趋势分析    | 1时间 + 2+数值 (宽表模式)         | MultiLine    | 同一时间点多个指标的趋势对比|
    |趋势分析    | 1时间 + 1数值 + 1分类字段 (长表模式)| MultiLine  | 多个实体/类别的趋势对比    |
    |占比分布    | 1分类 + 1数值                     | Pie          | 强调构成                   |
    |总量+构成   | 1分类 + 1数值                     | Ring         | 强调整体与部分之间的关系   |
    |关联分析    | 2+ 数值字段                       | Scatter      | 列之间的关系               |
    |股票金融    | 时间 + 4数值(OHLC)                | Candlestick  | 列之间的关系               |
    |多维比较    | 1分类 + 3+数值                    | Radar        | 维度与值展示               |
    |进度状态    | 1数值                             | Gauge        | 单值展示                   |

    **输出要求：**
    1.仅允许选择1个子图
    2.尽量选择图，然后是Table/Text
    3.**当数值字段个数>=2时：若包含时间字段，优先选择 MultiLine；若不含时间字段，选择 Table。**
    4.Line和MultiLine的区分：
      - 如果数据体现为“多列数值”（如CPU和Mem两列），选择 MultiLine。
      - 如果数据体现为“单列数值+分类列”（如name、id列和Value列），选择 MultiLine。
      - 仅有单列数值且无分类列，选择 Line。
    5.维度列不应该作为y轴，即使取值是一个数值：例如状态（1表示在线，0表示离线）
    6.如果有多个不同维度，则选择Table
    7.多实体判断规则（使用like字段进行比较），例如：
      - 用户查询目标为"a"，实体字段中出现了"a"、"bab"、"bb"、"ac"、"da"，应该根据like "%a%"规则，筛选出目标实体"a"、"bab"、"ac"、"da"，因此属于多实体比对
      - 用户查询目标为"b"，实体字段中出现了"b"、"c"，根据like "%b%"规则，筛选出目标实体"b"，因此属于单实体比对

    **输出格式(文本格式，禁止输出解释说明)：**
    kpis: 是否为宽表
    a: 是否为多实体
    title: 图表标题
    type: Table | Text | Chart
    content: 查询结果的数值，仅Text类型输出
    axisGroup: MultiLine系列名称来源列 (若数据为多指标宽表模式，此处填 "None")
    summaries: []
    series:
      - name: 系列名称
        type: Bar/Line/MultiLine
        ex: x轴数据源名称 **必须在查询结果中存在，保留原始名称**
        ey: y轴数据源名称 **必须在查询结果中存在，保留原始名称**
      - name: 系列名称
        type: Pie/Ring
        ename: 分类轴数据源名称 **必须在查询结果中存在，保留原始名称**
        evalue: 数值轴数据源名称 **必须在查询结果中存在，保留原始名称**
      - name: 系列名称
        type: Scatter
        ex: x轴数据源名称 **必须在查询结果中存在，保留原始名称**
        ey: y轴数据源名称 **必须在查询结果中存在，保留原始名称**
      - name: 系列名称
        type: Radar
        ename: 分类轴数据源名称 **必须在查询结果中存在，保留原始名称**
        evalue: 数值轴数据源名称 **必须在查询结果中存在，保留原始名称**
      - name: 系列名称
        type: Gauge
        ename: 分类轴数据源名称 **必须在查询结果中存在，保留原始名称**
        evalue: 数值轴数据源名称 **必须在查询结果中存在，保留原始名称**
      - name: 系列名称
        type: Candlestick
        time: X轴数据
        open: 开盘价
        close: 收盘价
        lowest: 最低价
        highest: 最高价
        volume: 成交量


    /no_think

